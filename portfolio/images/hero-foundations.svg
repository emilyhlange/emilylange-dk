  <line x1="460" y1="380" x2="490" y2="365" stroke="#1A1A1A" stroke-width="0.6" opacity="0.12"/>
  <line x1="640" y1="380" x2="615" y2="365" stroke="#1A1A1A" stroke-width="0.6" opacity="0.12"/>

