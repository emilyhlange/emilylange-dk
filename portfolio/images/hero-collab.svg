<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm paper background -->
  <rect width="800" height="500" fill="#EAECF0"/>

  <!-- Left cluster of nodes -->
  <circle cx="140" cy="180" r="18" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.3"/>
  <circle cx="140" cy="180" r="8" fill="#1A1A1A" opacity="0.4"/>

  <circle cx="100" cy="240" r="14" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="100" cy="240" r="6" fill="#1A1A1A" opacity="0.35"/>

  <circle cx="180" cy="260" r="12" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.2"/>
  <circle cx="180" cy="260" r="5" fill="#1A1A1A" opacity="0.3"/>

  <!-- Center primary node -->
  <circle cx="400" cy="250" r="24" fill="none" stroke="#1A1A1A" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="250" r="10" fill="#3B6FC2" opacity="0.7"/>

  <!-- Right cluster of nodes -->
  <circle cx="680" cy="190" r="16" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.28"/>
  <circle cx="680" cy="190" r="7" fill="#1A1A1A" opacity="0.38"/>

  <circle cx="720" cy="260" r="13" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.22"/>
  <circle cx="720" cy="260" r="5.5" fill="#1A1A1A" opacity="0.32"/>

  <circle cx="650" cy="300" r="15" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.25"/>
  <circle cx="650" cy="300" r="6" fill="#1A1A1A" opacity="0.35"/>

  <!-- Top cluster -->
  <circle cx="280" cy="100" r="11" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.2"/>
  <circle cx="280" cy="100" r="5" fill="#1A1A1A" opacity="0.3"/>

  <circle cx="360" cy="80" r="13" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.24"/>
  <circle cx="360" cy="80" r="5.5" fill="#1A1A1A" opacity="0.34"/>

  <circle cx="520" cy="110" r="12" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.23"/>
  <circle cx="520" cy="110" r="5" fill="#1A1A1A" opacity="0.33"/>

  <!-- Bottom cluster -->
  <circle cx="320" cy="380" r="14" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.26"/>
  <circle cx="320" cy="380" r="6" fill="#1A1A1A" opacity="0.36"/>

  <circle cx="480" cy="400" r="11" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.2"/>
  <circle cx="480" cy="400" r="5" fill="#1A1A1A" opacity="0.3"/>

  <!-- Flowing connections from center to nodes -->
  <!-- To left cluster -->
  <path d="M 375 245 Q 250 235 140 180" fill="none" stroke="#1A1A1A" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <path d="M 375 255 Q 240 250 100 240" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  <path d="M 380 260 Q 280 270 180 260" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.1" stroke-linecap="round"/>

  <!-- To right cluster -->
  <path d="M 425 245 Q 550 215 680 190" fill="none" stroke="#1A1A1A" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <path d="M 425 255 Q 570 258 720 260" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  <path d="M 420 265 Q 535 285 650 300" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.1" stroke-linecap="round"/>

  <!-- To top cluster -->
  <path d="M 390 230 Q 330 160 280 100" fill="none" stroke="#1A1A1A" stroke-width="1.1" opacity="0.14" stroke-linecap="round"/>
  <path d="M 400 225 Q 380 155 360 80" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.11" stroke-linecap="round"/>
  <path d="M 410 230 Q 460 170 520 110" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.1" stroke-linecap="round"/>

  <!-- To bottom cluster -->
  <path d="M 390 270 Q 355 325 320 380" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.12" stroke-linecap="round"/>
  <path d="M 410 270 Q 445 335 480 400" fill="none" stroke="#1A1A1A" stroke-width="1" opacity="0.11" stroke-linecap="round"/>

  <!-- Subtle inter-node connections for richness -->
  <path d="M 140 165 Q 160 120 280 100" fill="none" stroke="#5A8AD4" stroke-width="0.8" opacity="0.08" stroke-linecap="round"/>
  <path d="M 680 175 Q 620 140 520 110" fill="none" stroke="#5A8AD4" stroke-width="0.8" opacity="0.08" stroke-linecap="round"/>

  <!-- Accent dots on key connections -->
  <circle cx="280" cy="205" r="2.5" fill="#3B6FC2" opacity="0.4"/>
  <circle cx="540" cy="225" r="2.5" fill="#3B6FC2" opacity="0.35"/>
  <circle cx="155" cy="255" r="2" fill="#5A8AD4" opacity="0.3"/>
</svg>