  <line x1="638" y1="232" x2="702" y2="232" stroke="#1A1A1A" stroke-width="0.9" opacity="0.19"/>

  <rect x="630" y="275" width="80" height="25" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.23"/>
