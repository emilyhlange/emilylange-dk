  <line x1="70" y1="105" x2="165" y2="105" stroke="#1A1A1A" stroke-width="0.9" opacity="0.2"/>

  <rect x="60" y="145" width="120" height="28" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.3"/>
  <line x1="70" y1="157" x2="170" y2="157" stroke="#1A1A1A" stroke-width="1" opacity="0.22"/>
  <line x1="70" y1="166" x2="160" y2="166" stroke="#1A1A1A" stroke-width="0.9" opacity="0.18"/>

  <rect x="60" y="205" width="120" height="32" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.32"/>
