  <line x1="468" y1="242" x2="547" y2="242" stroke="#1A1A1A" stroke-width="0.95" opacity="0.19"/>
  <line x1="468" y1="250" x2="538" y2="250" stroke="#1A1A1A" stroke-width="0.85" opacity="0.14"/>

  <rect x="460" y="280" width="95" height="30" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.29"/>
  <line x1="468" y1="293" x2="547" y2="293" stroke="#1A1A1A" stroke-width="0.95" opacity="0.21"/>
  <line x1="468" y1="302" x2="542" y2="302" stroke="#1A1A1A" stroke-width="0.85" opacity="0.16"/>

