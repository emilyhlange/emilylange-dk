  <line x1="400" y1="70" x2="400" y2="340" stroke="#1A1A1A" stroke-width="0.8" opacity="0.08" stroke-dasharray="3,4"/>
  <line x1="600" y1="70" x2="600" y2="340" stroke="#1A1A1A" stroke-width="0.8" opacity="0.08" stroke-dasharray="3,4"/>

  <!-- Accent dots showing rhythm -->
  <circle cx="85" cy="340" r="2" fill="#3B6FC2" opacity="0.3"/>
  <circle cx="315" cy="340" r="2.5" fill="#3B6FC2" opacity="0.4"/>
  <circle cx="507" cy="340" r="2" fill="#5A8AD4" opacity="0.32"/>
  <circle cx="670" cy="340" r="1.8" fill="#1A1A1A" opacity="0.2"/>
</svg>