  <rect x="630" y="110" width="80" height="24" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.22"/>
  <line x1="638" y1="120" x2="702" y2="120" stroke="#1A1A1A" stroke-width="0.9" opacity="0.16"/>

  <rect x="630" y="165" width="80" height="26" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.24"/>
  <line x1="638" y1="176" x2="702" y2="176" stroke="#1A1A1A" stroke-width="0.9" opacity="0.18"/>

