  <rect x="260" y="100" width="110" height="32" fill="none" stroke="#1A1A1A" stroke-width="1.5" opacity="0.4" rx="1"/>
  <line x1="270" y1="114" x2="360" y2="114" stroke="#1A1A1A" stroke-width="1.1" opacity="0.3"/>
  <line x1="270" y1="123" x2="355" y2="123" stroke="#1A1A1A" stroke-width="1" opacity="0.22"/>

