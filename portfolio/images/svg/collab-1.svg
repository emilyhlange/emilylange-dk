<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Connections -->
  <line x1="400" y1="250" x2="200" y2="150" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="250" x2="600" y2="150" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="250" x2="150" y2="300" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="250" x2="650" y2="320" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="250" x2="350" y2="380" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="250" x2="550" y2="370" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>

  <!-- Nodes -->
  <!-- Central node -->
  <circle cx="400" cy="250" r="35" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Upper left -->
  <circle cx="200" cy="150" r="24" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Upper right -->
  <circle cx="600" cy="150" r="22" fill="#b8c4d4" filter="url(#subtle-shadow)"/>

  <!-- Left -->
  <circle cx="150" cy="300" r="20" fill="#b8c4d4" filter="url(#subtle-shadow)"/>

  <!-- Right -->
  <circle cx="650" cy="320" r="26" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Lower left -->
  <circle cx="350" cy="380" r="19" fill="#b8c4b8" filter="url(#subtle-shadow)"/>

  <!-- Lower right -->
  <circle cx="550" cy="370" r="23" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
</svg>