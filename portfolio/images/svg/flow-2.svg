<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Stack of rejection letters (slightly offset, rotated) -->

  <!-- Letter 1 - back, most offset -->
  <g transform="translate(140, 280) rotate(-8)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
    <line x1="15" y1="30" x2="125" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="55" x2="125" y2="55" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
    <line x1="15" y1="75" x2="120" y2="75" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
    <line x1="15" y1="95" x2="125" y2="95" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Letter 2 -->
  <g transform="translate(180, 260) rotate(-4)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#b8c4d4" filter="url(#subtle-shadow)"/>
    <line x1="15" y1="30" x2="125" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="55" x2="125" y2="55" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="75" x2="120" y2="75" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="95" x2="125" y2="95" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Letter 3 - center -->
  <g transform="translate(320, 250)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#b8c4b8" filter="url(#subtle-shadow)"/>
    <line x1="15" y1="30" x2="125" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="55" x2="125" y2="55" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="75" x2="120" y2="75" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="95" x2="125" y2="95" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Letter 4 -->
  <g transform="translate(420, 260) rotate(4)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#f0ebe5" filter="url(#subtle-shadow)"/>
    <line x1="15" y1="30" x2="125" y2="30" stroke="#8a8a8a" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="55" x2="125" y2="55" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="75" x2="120" y2="75" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
    <line x1="15" y1="95" x2="125" y2="95" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Letter 5 -->
  <g transform="translate(470, 280) rotate(8)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
    <line x1="15" y1="30" x2="125" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
    <line x1="15" y1="55" x2="125" y2="55" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
    <line x1="15" y1="75" x2="120" y2="75" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
    <line x1="15" y1="95" x2="125" y2="95" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Letter 6 - front, most visible -->
  <g transform="translate(560, 300) rotate(12)">
    <rect x="0" y="0" width="140" height="200" rx="6" fill="#b8c4d4" filter="url(#subtle-shadow)"/>
    <line x1="15" y1="30" x2="125" y2="30" stroke="#ffffff" stroke-width="2" opacity="0.7"/>
    <line x1="15" y1="55" x2="125" y2="55" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="75" x2="120" y2="75" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="15" y1="95" x2="125" y2="95" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>