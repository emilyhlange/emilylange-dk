<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- 4x3 component grid -->
  <!-- Row 1 -->
  <!-- Cell 1-1 -->
  <rect x="60" y="50" width="140" height="110" rx="10" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
  <circle cx="90" cy="80" r="8" fill="#f0ebe5"/>

  <!-- Cell 1-2 -->
  <rect x="230" y="50" width="140" height="110" rx="10" fill="#b8c4d4" filter="url(#subtle-shadow)"/>
  <rect x="250" y="75" width="30" height="30" rx="6" fill="#ffffff" opacity="0.6"/>
  <rect x="295" y="75" width="50" height="30" rx="6" fill="#ffffff" opacity="0.4"/>

  <!-- Cell 1-3 -->
  <rect x="400" y="50" width="140" height="110" rx="10" fill="none" stroke="#b8c4b8" stroke-width="2"/>
  <circle cx="440" cy="105" r="6" fill="#b8c4b8" opacity="0.5"/>
  <circle cx="460" cy="95" r="6" fill="#b8c4b8" opacity="0.5"/>

  <!-- Cell 1-4 -->
  <rect x="570" y="50" width="170" height="110" rx="10" fill="#f0ebe5" filter="url(#subtle-shadow)"/>
  <line x1="590" y1="80" x2="720" y2="80" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="590" y1="95" x2="720" y2="95" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="590" y1="110" x2="710" y2="110" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>

  <!-- Row 2 -->
  <!-- Cell 2-1 -->
  <rect x="60" y="190" width="140" height="110" rx="10" fill="#b8c4d4" filter="url(#subtle-shadow)"/>
  <circle cx="120" cy="230" r="12" fill="#ffffff" opacity="0.7"/>
  <rect x="105" cy="250" width="30" height="8" rx="2" fill="#ffffff" opacity="0.5"/>

  <!-- Cell 2-2 -->
  <rect x="230" y="190" width="140" height="110" rx="10" fill="none" stroke="#d4ccc2" stroke-width="2"/>
  <circle cx="260" cy="220" r="7" fill="#d4ccc2" opacity="0.4"/>
  <line x1="280" y1="215" x2="340" y2="215" stroke="#d4ccc2" stroke-width="1.5" opacity="0.3"/>

  <!-- Cell 2-3 -->
  <rect x="400" y="190" width="140" height="110" rx="10" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
  <rect x="420" y="210" width="20" height="20" rx="4" fill="#f0ebe5"/>
  <rect x="450" y="210" width="20" height="20" rx="4" fill="#f0ebe5" opacity="0.6"/>

  <!-- Cell 2-4 -->
  <rect x="570" y="190" width="170" height="110" rx="10" fill="#b8c4b8" filter="url(#subtle-shadow)"/>
  <circle cx="600" cy="235" r="10" fill="#ffffff" opacity="0.5"/>
  <line x1="620" y1="235" x2="720" y2="235" stroke="#ffffff" stroke-width="2" opacity="0.4"/>

  <!-- Row 3 -->
  <!-- Cell 3-1 -->
  <rect x="60" y="330" width="140" height="110" rx="10" fill="none" stroke="#b8c4d4" stroke-width="2"/>
  <line x1="80" y1="355" x2="180" y2="355" stroke="#b8c4d4" stroke-width="1.5" opacity="0.3"/>
  <line x1="80" y1="375" x2="180" y2="375" stroke="#b8c4d4" stroke-width="1.5" opacity="0.3"/>

  <!-- Cell 3-2 -->
  <rect x="230" y="330" width="140" height="110" rx="10" fill="#f0ebe5" filter="url(#subtle-shadow)"/>
  <circle cx="270" cy="370" r="9" fill="#d4ccc2"/>
  <circle cx="310" cy="370" r="9" fill="#d4ccc2" opacity="0.6"/>

  <!-- Cell 3-3 -->
  <rect x="400" y="330" width="140" height="110" rx="10" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
  <line x1="420" y1="355" x2="520" y2="355" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <rect x="420" y="375" width="100" height="6" rx="3" fill="#f0ebe5" opacity="0.4"/>

  <!-- Cell 3-4 -->
  <rect x="570" y="330" width="170" height="110" rx="10" fill="none" stroke="#f0ebe5" stroke-width="2.5" opacity="0.8"/>
  <circle cx="630" cy="360" r="8" fill="#f0ebe5" opacity="0.6"/>
  <rect x="610" y="385" width="40" height="8" rx="2" fill="#f0ebe5" opacity="0.4"/>
</svg>