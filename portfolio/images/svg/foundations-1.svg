<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Nested rectangles - tokens -->
  <!-- Largest (outermost) -->
  <rect x="150" y="100" width="500" height="300" rx="0" fill="none" stroke="#d4ccc2" stroke-width="2"/>

  <!-- Measurement marks -->
  <line x1="140" y1="100" x2="130" y2="100" stroke="#8a8a8a" stroke-width="1.5" opacity="0.5"/>
  <line x1="140" y1="400" x2="130" y2="400" stroke="#8a8a8a" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="95" x2="150" y2="85" stroke="#8a8a8a" stroke-width="1.5" opacity="0.5"/>
  <line x1="650" y1="95" x2="650" y2="85" stroke="#8a8a8a" stroke-width="1.5" opacity="0.5"/>

  <!-- Second layer (gap between) -->
  <rect x="180" y="130" width="440" height="240" rx="0" fill="none" stroke="#b8c4b8" stroke-width="2"/>

  <!-- Measurement marks -->
  <line x1="170" y1="130" x2="160" y2="130" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="170" y1="370" x2="160" y2="370" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="180" y1="125" x2="180" y2="115" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  <line x1="620" y1="125" x2="620" y2="115" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>

  <!-- Third layer -->
  <rect x="210" y="160" width="380" height="180" rx="0" fill="none" stroke="#b8c4d4" stroke-width="2"/>

  <!-- Measurement marks -->
  <line x1="200" y1="160" x2="190" y2="160" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="200" y1="340" x2="190" y2="340" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="210" y1="155" x2="210" y2="145" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="590" y1="155" x2="590" y2="145" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>

  <!-- Innermost layer -->
  <rect x="240" y="190" width="320" height="120" rx="0" fill="#d4ccc2" opacity="0.15"/>

  <!-- Measurement marks -->
  <line x1="230" y1="190" x2="220" y2="190" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="230" y1="310" x2="220" y2="310" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="240" y1="185" x2="240" y2="175" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="560" y1="185" x2="560" y2="175" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
</svg>