<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Content blocks -->
  <!-- Block 1 - full width -->
  <rect x="80" y="50" width="320" height="30" rx="4" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Block 2 - indented, narrower -->
  <rect x="120" y="110" width="240" height="26" rx="4" fill="#f0ebe5" filter="url(#subtle-shadow)"/>

  <!-- Block 3 - full width -->
  <rect x="80" y="165" width="340" height="28" rx="4" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Block 4 - indented -->
  <rect x="120" y="220" width="200" height="24" rx="4" fill="#f0ebe5" filter="url(#subtle-shadow)"/>

  <!-- Block 5 - indented deeper -->
  <rect x="160" y="270" width="160" height="22" rx="4" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Block 6 - full width -->
  <rect x="80" y="320" width="360" height="30" rx="4" fill="#f0ebe5" filter="url(#subtle-shadow)"/>

  <!-- Block 7 - indented -->
  <rect x="120" y="375" width="220" height="26" rx="4" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Block 8 - indented -->
  <rect x="120" y="420" width="280" height="24" rx="4" fill="#f0ebe5" filter="url(#subtle-shadow)"/>
</svg>