<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Open spread (two pages) -->
  <!-- Left page -->
  <rect x="80" y="60" width="280" height="320" rx="8" fill="#f0ebe5" filter="url(#subtle-shadow)"/>

  <!-- Right page (image placeholder) -->
  <rect x="380" y="60" width="280" height="320" rx="8" fill="#b8c4d4" filter="url(#subtle-shadow)"/>

  <!-- Subtle spine/fold -->
  <line x1="360" y1="60" x2="360" y2="380" stroke="#8a8a8a" stroke-width="1" opacity="0.2"/>

  <!-- Text lines on left page -->
  <line x1="110" y1="95" x2="320" y2="95" stroke="#8a8a8a" stroke-width="2" opacity="0.4"/>
  <line x1="110" y1="120" x2="320" y2="120" stroke="#8a8a8a" stroke-width="1.5" opacity="0.35"/>
  <line x1="110" y1="140" x2="320" y2="140" stroke="#8a8a8a" stroke-width="1.5" opacity="0.35"/>
  <line x1="110" y1="160" x2="310" y2="160" stroke="#8a8a8a" stroke-width="1.5" opacity="0.35"/>
  <line x1="110" y1="190" x2="320" y2="190" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="110" y1="210" x2="320" y2="210" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="110" y1="230" x2="300" y2="230" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="110" y1="260" x2="320" y2="260" stroke="#8a8a8a" stroke-width="1.5" opacity="0.25"/>
  <line x1="110" y1="280" x2="315" y2="280" stroke="#8a8a8a" stroke-width="1.5" opacity="0.25"/>

  <!-- Musical waveform along bottom left -->
  <line x1="110" y1="330" x2="125" y2="310" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="130" y1="330" x2="145" y2="295" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="150" y1="330" x2="165" y2="315" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="170" y1="330" x2="185" y2="300" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="190" y1="330" x2="205" y2="320" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="210" y1="330" x2="225" y2="305" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="230" y1="330" x2="245" y2="310" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="250" y1="330" x2="265" y2="290" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>
  <line x1="270" y1="330" x2="285" y2="315" stroke="#d4ccc2" stroke-width="2.5" opacity="0.5"/>

  <!-- Image placeholder on right with subtle content hint -->
  <rect x="400" y="100" width="240" height="240" rx="4" fill="#d4ccc2" opacity="0.3" filter="url(#subtle-shadow)"/>
  <circle cx="520" cy="220" r="40" fill="#b8c4b8" opacity="0.4"/>
</svg>