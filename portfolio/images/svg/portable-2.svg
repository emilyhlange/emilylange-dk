<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Table (circle from above) -->
  <circle cx="400" cy="280" r="140" fill="none" stroke="#8a8a8a" stroke-width="2" opacity="0.3"/>

  <!-- Inner circle hint -->
  <circle cx="400" cy="280" r="120" fill="none" stroke="#8a8a8a" stroke-width="1" opacity="0.2"/>

  <!-- Card 1 - Top -->
  <g transform="translate(400, 100)">
    <rect x="-45" y="0" width="90" height="60" rx="6" fill="#d4ccc2" filter="url(#subtle-shadow)"/>
    <circle cx="-25" cy="18" r="4" fill="#f0ebe5"/>
    <line x1="-15" y1="18" x2="35" y2="18" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Card 2 - Right -->
  <g transform="translate(580, 280)">
    <rect x="0" y="-30" width="90" height="60" rx="6" fill="#b8c4d4" filter="url(#subtle-shadow)"/>
    <circle cx="20" cy="-12" r="4" fill="#ffffff" opacity="0.7"/>
    <line x1="30" y1="-12" x2="75" y2="-12" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Card 3 - Bottom -->
  <g transform="translate(400, 460)">
    <rect x="-45" y="-60" width="90" height="60" rx="6" fill="#b8c4b8" filter="url(#subtle-shadow)"/>
    <circle cx="-25" cy="-42" r="4" fill="#ffffff" opacity="0.6"/>
    <line x1="-15" y1="-42" x2="35" y2="-42" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Card 4 - Left -->
  <g transform="translate(220, 280)">
    <rect x="-90" y="-30" width="90" height="60" rx="6" fill="#f0ebe5" filter="url(#subtle-shadow)"/>
    <circle cx="-70" cy="-12" r="4" fill="#8a8a8a" opacity="0.5"/>
    <line x1="-60" y1="-12" x2="-15" y2="-12" stroke="#8a8a8a" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Optional 5th card - Top Right -->
  <g transform="translate(520, 180)">
    <rect x="0" y="0" width="85" height="55" rx="6" fill="#d4ccc2" filter="url(#subtle-shadow)" opacity="0.8"/>
    <circle cx="15" cy="15" r="3.5" fill="#b8c4b8" opacity="0.6"/>
    <line x1="25" y1="15" x2="70" y2="15" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>