<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Painting frame (ornate-ish corners) -->
  <rect x="100" y="80" width="350" height="300" rx="6" fill="#d4ccc2" filter="url(#subtle-shadow)"/>

  <!-- Ornate corner details -->
  <!-- Top-left corner -->
  <polygon points="100,80 120,80 100,105" fill="#8a8a8a" opacity="0.3"/>
  <!-- Top-right corner -->
  <polygon points="450,80 430,80 450,105" fill="#8a8a8a" opacity="0.3"/>
  <!-- Bottom-left corner -->
  <polygon points="100,380 120,380 100,355" fill="#8a8a8a" opacity="0.3"/>
  <!-- Bottom-right corner -->
  <polygon points="450,380 430,380 450,355" fill="#8a8a8a" opacity="0.3"/>

  <!-- Painting inner content -->
  <rect x="115" y="95" width="320" height="270" rx="3" fill="#b8c4b8" opacity="0.4"/>

  <!-- Email window (overlaid on top) -->
  <rect x="280" y="180" width="380" height="260" rx="8" fill="#f0ebe5" filter="url(#subtle-shadow)"/>

  <!-- Email toolbar / header -->
  <rect x="280" y="180" width="380" height="40" rx="8" fill="#8a8a8a" opacity="0.4"/>

  <!-- Toolbar buttons -->
  <rect x="295" y="190" width="24" height="20" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="325" y="190" width="24" height="20" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="355" y="190" width="24" height="20" rx="3" fill="#ffffff" opacity="0.4"/>

  <!-- Email content lines -->
  <line x1="300" y1="245" x2="620" y2="245" stroke="#8a8a8a" stroke-width="2" opacity="0.4"/>
  <line x1="300" y1="265" x2="620" y2="265" stroke="#8a8a8a" stroke-width="1.5" opacity="0.35"/>
  <line x1="300" y1="280" x2="620" y2="280" stroke="#8a8a8a" stroke-width="1.5" opacity="0.35"/>
  <line x1="300" y1="295" x2="600" y2="295" stroke="#8a8a8a" stroke-width="1.5" opacity="0.35"/>
  <line x1="300" y1="320" x2="620" y2="320" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>
  <line x1="300" y1="335" x2="610" y2="335" stroke="#8a8a8a" stroke-width="1.5" opacity="0.3"/>

  <!-- Email action buttons -->
  <rect x="300" y="375" width="60" height="25" rx="4" fill="#d4ccc2" opacity="0.6"/>
  <text x="330" y="392" font-size="10" fill="#ffffff" text-anchor="middle" font-family="monospace" opacity="0.6">Send</text>

  <rect x="375" y="375" width="60" height="25" rx="4" fill="#b8c4d4" opacity="0.5"/>
  <text x="405" y="392" font-size="10" fill="#ffffff" text-anchor="middle" font-family="monospace" opacity="0.5">Draft</text>
</svg>