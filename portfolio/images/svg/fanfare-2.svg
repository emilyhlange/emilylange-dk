<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="subtle-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  

  <!-- Floor line -->
  <line x1="0" y1="420" x2="800" y2="420" stroke="#8a8a8a" stroke-width="2" opacity="0.3"/>

  <!-- Glass vitrine (3D-ish rectangular box) -->
  <!-- Front face (largest) -->
  <rect x="250" y="200" width="300" height="220" rx="8" fill="none" stroke="#8a8a8a" stroke-width="2" opacity="0.4"/>

  <!-- Top edge (perspective) -->
  <line x1="250" y1="200" x2="280" y2="170" stroke="#8a8a8a" stroke-width="2" opacity="0.3"/>
  <line x1="550" y1="200" x2="580" y2="170" stroke="#8a8a8a" stroke-width="2" opacity="0.3"/>
  <line x1="280" y1="170" x2="580" y2="170" stroke="#8a8a8a" stroke-width="2" opacity="0.3"/>

  <!-- Side edge (perspective) -->
  <line x1="550" y1="200" x2="580" y2="170" stroke="#8a8a8a" stroke-width="1.5" opacity="0.25"/>

  <!-- Front doors (subtle division) -->
  <line x1="400" y1="200" x2="400" y2="420" stroke="#8a8a8a" stroke-width="1" opacity="0.2"/>

  <!-- Objects inside the vitrine -->
  <!-- Object 1 - left side -->
  <circle cx="310" cy="280" r="35" fill="#d4ccc2" opacity="0.8" filter="url(#subtle-shadow)"/>

  <!-- Object 2 - center -->
  <rect x="380" y="320" width="40" height="80" rx="6" fill="#b8c4d4" opacity="0.7" filter="url(#subtle-shadow)"/>

  <!-- Object 3 - right side -->
  <polygon points="530,340 500,420 560,420" fill="#b8c4b8" opacity="0.6" filter="url(#subtle-shadow)"/>

  <!-- Object 4 - top left -->
  <rect x="290" y="220" width="50" height="50" rx="8" fill="#f0ebe5" opacity="0.7" filter="url(#subtle-shadow)"/>

  <!-- Subtle highlight on glass -->
  <line x1="255" y1="210" x2="255" y2="400" stroke="#ffffff" stroke-width="2" opacity="0.2"/>
</svg>