<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins — Product Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #ffffff;
            --fg: #292929;
            --fg-dim: #888888;
            --border: #e8e8e8;
        }

        [data-theme="dark"] {
            --bg: #111111;
            --fg: #e8e8e8;
            --fg-dim: #666666;
            --border: #2a2a2a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise" /></filter><rect width="100" height="100" fill="%23ffffff" opacity="0.03"/><rect width="100" height="100" fill="%23000000" opacity="0.02" filter="url(%23noise)"/></svg>');
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        .loader-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .slideshow-frame {
            width: 65vw;
            max-width: 900px;
            aspect-ratio: 4 / 3;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--fg-dim);
            position: relative;
            opacity: 1;
            transform: scale(1);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .slideshow-frame.fade-out {
            opacity: 0;
            transform: scale(0.8);
        }

        .slideshow-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(0.98);
            filter: grayscale(100%) contrast(1.1);
            animation: fadeInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .content-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        .content-wrapper.visible {
            opacity: 1;
            transform: scale(1);
        }

        .name-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        .name-line {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .name-line:first-child {
            margin-bottom: 0.2em;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            color: var(--fg-dim);
            font-weight: 500;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            margin-top: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .enter-link {
            color: var(--fg);
            text-decoration: none;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            font-weight: 500;
            letter-spacing: 0.01em;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.5em;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .enter-link:hover {
            color: var(--fg-dim);
            gap: 0.8em;
        }

        .enter-link span {
            display: inline-block;
        }

        .enter-link .arrow {
            transition: transform 0.3s ease;
        }

        .enter-link:hover .arrow {
            transform: translateX(4px);
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="slideshow-frame" id="slideshowFrame">
            <img class="slideshow-image" src="portfolio/images/hero-thesis.jpg" alt="">
            <img class="slideshow-image" src="portfolio/images/hero-portable.jpg" alt="">
            <img class="slideshow-image" src="portfolio/images/hero-fanfare.jpg" alt="">
            <img class="slideshow-image" src="portfolio/images/hero-tune.jpg" alt="">
            <img class="slideshow-image" src="portfolio/images/hero-flow.jpg" alt="">
            <img class="slideshow-image" src="portfolio/images/ProfilePic.jpg" alt="">
        </div>

        <div class="content-wrapper" id="contentWrapper">
            <div class="name-container">
                <div class="name-line">Emily</div>
                <div class="name-line">Howkins</div>
                <div class="subtitle">Product Designer</div>
            </div>
            <a href="#" class="enter-link">
                <span>enter</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <script>
        const images = document.querySelectorAll('.slideshow-image');
        const slideshowFrame = document.getElementById('slideshowFrame');
        const contentWrapper = document.getElementById('contentWrapper');
        let currentIndex = 0;
        const cycleSpeed = 275; // ms per image
        const totalCycles = 1.5; // 1.5 complete cycles through all images
        const totalImages = images.length;
        const totalFrames = Math.ceil(totalImages * totalCycles);
        let frameCount = 0;

        function showImage(index) {
            images.forEach((img, i) => {
                if (i === index % totalImages) {
                    img.style.opacity = '1';
                    img.style.zIndex = 10;
                } else {
                    img.style.opacity = '0';
                    img.style.zIndex = 0;
                }
            });
        }

        function cycleImages() {
            showImage(frameCount % totalImages);
            frameCount++;

            if (frameCount < totalFrames) {
                setTimeout(cycleImages, cycleSpeed);
            } else {
                // Hold final image for a beat, then transition
                setTimeout(() => {
                    slideshowFrame.classList.add('fade-out');
                    contentWrapper.classList.add('visible');
                }, 400);
            }
        }

        // Start cycling on page load
        window.addEventListener('load', () => {
            cycleImages();
        });

        // Fallback: start immediately if images load slowly
        setTimeout(() => {
            if (frameCount === 0) {
                cycleImages();
            }
        }, 100);
    </script>
</body>
</html>
