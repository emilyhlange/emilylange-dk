<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#DDD5C8"/>

  <!-- Email window frame -->
  <rect x="96" y="88" width="608" height="424" rx="3" fill="#CAC1B5" stroke="#1C1409" stroke-width="1.5" opacity="0.55"/>

  <!-- Window chrome bar -->
  <rect x="96" y="88" width="608" height="28" rx="3" fill="#B8AFA4" stroke="#1C1409" stroke-width="1.5" opacity="0.65"/>
  <line x1="96" y1="116" x2="704" y2="116" stroke="#1C1409" stroke-width="1" opacity="0.3"/>

  <!-- Traffic lights -->
  <circle cx="116" cy="102" r="6" fill="#8B2E3F" opacity="0.75"/>
  <circle cx="133" cy="102" r="6" fill="#1C1409" opacity="0.18"/>
  <circle cx="150" cy="102" r="6" fill="#1C1409" opacity="0.18"/>

  <!-- Toolbar labels -->
  <text x="116" y="111" font-family="Arial, sans-serif" font-size="7.5" fill="#1C1409" opacity="0.38" letter-spacing="0.08em">Send    Attach    Address    Fonts    Colors</text>

  <!-- To field -->
  <text x="112" y="144" font-family="Arial, sans-serif" font-size="9" fill="#1C1409" opacity="0.42">To:</text>
  <text x="136" y="144" font-family="Arial, sans-serif" font-size="9" fill="#1C1409" opacity="0.60">emilysøgerarbejde@aol.com</text>
  <line x1="112" y1="152" x2="688" y2="152" stroke="#1C1409" stroke-width="0.8" opacity="0.18"/>

  <!-- Subject field -->
  <text x="112" y="170" font-family="Arial, sans-serif" font-size="9" fill="#1C1409" opacity="0.42">Subject:</text>
  <line x1="112" y1="178" x2="688" y2="178" stroke="#1C1409" stroke-width="0.8" opacity="0.15"/>

  <!-- Greeting -->
  <text x="112" y="210" font-family="Arial, sans-serif" font-size="10.5" fill="#1C1409" opacity="0.58">Kære Emily</text>

  <!-- Body text lines -->
  <line x1="112" y1="232" x2="672" y2="232" stroke="#1C1409" stroke-width="1" opacity="0.22"/>
  <line x1="112" y1="248" x2="658" y2="248" stroke="#1C1409" stroke-width="1" opacity="0.20"/>
  <line x1="112" y1="264" x2="664" y2="264" stroke="#1C1409" stroke-width="1" opacity="0.18"/>
  <line x1="112" y1="280" x2="640" y2="280" stroke="#1C1409" stroke-width="1" opacity="0.16"/>

  <!-- "desværre." — the centrepiece -->
  <text x="112" y="350" font-family="Georgia, serif" font-size="54" font-weight="400" font-style="italic"
        fill="#8B2E3F" opacity="0.78">desværre.</text>

  <!-- Closing lines -->
  <line x1="112" y1="386" x2="420" y2="386" stroke="#1C1409" stroke-width="0.9" opacity="0.18"/>
  <line x1="112" y1="402" x2="380" y2="402" stroke="#1C1409" stroke-width="0.9" opacity="0.14"/>

  <!-- Footer rule -->
  <line x1="80" y1="536" x2="720" y2="536" stroke="#1C1409" stroke-width="1" opacity="0.25"/>
  <text x="96" y="554" font-family="Arial, sans-serif" font-size="11" fill="#1C1409" opacity="0.52" letter-spacing="0.10em">FLOW — CREATIVE BOOK — AMSTERDAM</text>
</svg>
