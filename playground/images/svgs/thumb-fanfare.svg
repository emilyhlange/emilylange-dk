<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#DDD5C8"/>

  <!-- Type grid lines — more visible -->
  <line x1="60" y1="110" x2="740" y2="110" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="148" x2="740" y2="148" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="186" x2="740" y2="186" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="224" x2="740" y2="224" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="350" x2="740" y2="350" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="388" x2="740" y2="388" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="426" x2="740" y2="426" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="464" x2="740" y2="464" stroke="#1C1409" stroke-width="0.8" opacity="0.2"/>

  <!-- Large background A -->
  <text x="108" y="510" font-family="Georgia, serif" font-size="510" font-weight="700"
        fill="none" stroke="#1C1409" stroke-width="2" opacity="0.14">A</text>

  <!-- Foreground lowercase a — burgundy, stronger -->
  <text x="368" y="360" font-family="Georgia, serif" font-size="300" font-weight="400"
        fill="none" stroke="#8B2E3F" stroke-width="2.5" opacity="0.72">a</text>

  <!-- Specimen label -->
  <text x="72" y="100" font-family="Arial, sans-serif" font-size="11"
        fill="#1C1409" opacity="0.52" letter-spacing="0.14em">FANFARE — TYPE SPECIMEN — 2021</text>

  <!-- Baseline rule -->
  <line x1="60" y1="524" x2="740" y2="524" stroke="#1C1409" stroke-width="1.2" opacity="0.3"/>

  <!-- Small character set -->
  <text x="72" y="558" font-family="Georgia, serif" font-size="22" fill="#1C1409" opacity="0.42"
        letter-spacing="0.06em">Aa Bb Cc Dd Ee Ff Gg Hh Ii</text>
</svg>
