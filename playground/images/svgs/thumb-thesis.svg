<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#DDD5C8"/>

  <!-- Expanding light rings — stronger dusty blue -->
  <circle cx="470" cy="268" r="230" fill="none" stroke="#6B92A8" stroke-width="1" opacity="0.4"/>
  <circle cx="470" cy="268" r="190" fill="none" stroke="#6B92A8" stroke-width="1.2" opacity="0.52"/>
  <circle cx="470" cy="268" r="150" fill="none" stroke="#6B92A8" stroke-width="1.5" opacity="0.65"/>
  <circle cx="470" cy="268" r="112" fill="none" stroke="#6B92A8" stroke-width="1.8" opacity="0.75"/>

  <!-- Lamp globe -->
  <circle cx="470" cy="268" r="76" fill="#C4B8A8" stroke="#1C1409" stroke-width="2"/>
  <!-- Lamp base neck -->
  <line x1="470" y1="344" x2="470" y2="398" stroke="#1C1409" stroke-width="2"/>
  <!-- Lamp base disc -->
  <ellipse cx="470" cy="400" rx="40" ry="9" fill="none" stroke="#1C1409" stroke-width="2"/>

  <!-- Warm glow — burgundy -->
  <circle cx="470" cy="268" r="12" fill="#8B2E3F"/>
  <circle cx="470" cy="268" r="30" fill="none" stroke="#8B2E3F" stroke-width="1.5" opacity="0.6"/>
  <circle cx="470" cy="268" r="52" fill="none" stroke="#8B2E3F" stroke-width="1" opacity="0.3"/>

  <!-- Seated figure -->
  <circle cx="210" cy="390" r="20" fill="none" stroke="#1C1409" stroke-width="1.8"/>
  <line x1="210" y1="410" x2="210" y2="452" stroke="#1C1409" stroke-width="1.8"/>
  <path d="M210,452 Q176,468 164,488" stroke="#1C1409" stroke-width="1.8" fill="none"/>
  <path d="M210,452 Q244,468 256,488" stroke="#1C1409" stroke-width="1.8" fill="none"/>
  <path d="M164,488 Q210,478 256,488" stroke="#1C1409" stroke-width="1.8" fill="none"/>
  <path d="M210,428 Q182,448 170,468" stroke="#1C1409" stroke-width="1.8" fill="none"/>
  <path d="M210,428 Q238,448 250,468" stroke="#1C1409" stroke-width="1.8" fill="none"/>

  <!-- Ground line -->
  <line x1="60" y1="524" x2="740" y2="524" stroke="#1C1409" stroke-width="1" opacity="0.3"/>

  <!-- Card / journal marks -->
  <rect x="610" y="390" width="52" height="72" rx="2" fill="none" stroke="#1C1409" stroke-width="1.4" opacity="0.45"/>
  <rect x="624" y="404" width="52" height="72" rx="2" fill="none" stroke="#1C1409" stroke-width="1.2" opacity="0.35"/>
  <line x1="616" y1="415" x2="656" y2="415" stroke="#1C1409" stroke-width="1" opacity="0.35"/>
  <line x1="616" y1="428" x2="656" y2="428" stroke="#1C1409" stroke-width="1" opacity="0.3"/>
  <line x1="616" y1="441" x2="656" y2="441" stroke="#1C1409" stroke-width="1" opacity="0.3"/>
</svg>
