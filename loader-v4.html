<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins — Product Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --fg: #292929;
            --fg-dim: #888888;
            --border: #e8e8e8;
        }

        [data-theme="dark"] {
            --bg: #111111;
            --fg: #e8e8e8;
            --fg-dim: #666666;
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            transition: background-color 0.3s, color 0.3s;
        }

        /* Grain overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image:
                url('data:image/svg+xml;charset=utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2"/><feColorMatrix type="saturate" values="0.1"/></filter><rect width="100" height="100" fill="rgba(0,0,0,0.02)" filter="url(%23noise)"/></svg>');
            z-index: 9998;
        }

        /* Loader container */
        .loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOutLoader 0.6s ease-out 2.4s forwards;
        }

        @keyframes fadeOutLoader {
            from {
                opacity: 1;
                visibility: visible;
            }
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Stacking area */
        .stack-area {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        /* Block styles */
        .stack-block {
            position: absolute;
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        [data-theme="dark"] .stack-block {
            background: linear-gradient(135deg, #1a1a1a 0%, #242424 100%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        /* Drop and bounce animation */
        .stack-block {
            animation: dropBlock 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes dropBlock {
            0% {
                opacity: 1;
                transform: translateX(var(--start-x)) translateY(-100vh) rotateZ(0deg);
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 1;
                transform: translateX(0) translateY(var(--end-y)) rotateZ(0deg);
            }
        }

        /* Dissolve blocks */
        .stack-block.dissolve {
            animation: dissolveBlock 0.5s ease-out forwards;
        }

        @keyframes dissolveBlock {
            from {
                opacity: 1;
                transform: translateX(0) translateY(var(--end-y)) rotateZ(0deg);
            }
            to {
                opacity: 0;
                transform: translateX(0) translateY(calc(var(--end-y) - 20px)) rotateZ(2deg);
            }
        }

        /* Content reveal */
        .content {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 1000;
            animation: revealContent 0.8s ease-out 2.4s forwards;
        }

        @keyframes revealContent {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .content-inner {
            text-align: center;
            animation: contentReveal 1.0s ease-out 2.5s forwards;
        }

        @keyframes contentReveal {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .name {
            font-weight: 700;
            font-size: clamp(48px, 12vw, 120px);
            line-height: 1.1;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .name-line {
            display: block;
        }

        .subtitle {
            font-weight: 500;
            font-size: clamp(14px, 2vw, 18px);
            color: var(--fg-dim);
            margin-top: clamp(12px, 2vw, 24px);
            letter-spacing: 0.01em;
        }

        .cta {
            margin-top: clamp(24px, 4vw, 48px);
            font-weight: 500;
            font-size: clamp(14px, 2vw, 18px);
            color: var(--fg);
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .cta:hover {
            color: var(--fg-dim);
            border-bottom-color: var(--border);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .stack-block {
                border-radius: 3px;
            }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="stack-area" id="stackArea"></div>
    </div>

    <div class="content">
        <div class="content-inner">
            <h1 class="name">
                <span class="name-line">Emily</span>
                <span class="name-line">Howkins</span>
            </h1>
            <p class="subtitle">Product Designer</p>
            <a href="#" class="cta">enter →</a>
        </div>
    </div>

    <script>
        const BLOCK_COUNT = 20;
        const STACK_WIDTH = 120;
        const BLOCK_HEIGHT = 36;
        const ANIMATION_DURATION = 700;
        const STAGGER_DELAY = 80;
        const TOTAL_LOADER_TIME = 2400;

        function createStackBlocks() {
            const container = document.getElementById('stackArea');
            const blocks = [];

            // Calculate total stack height
            const totalStackHeight = BLOCK_COUNT * BLOCK_HEIGHT;
            const startY = -(totalStackHeight / 2);

            for (let i = 0; i < BLOCK_COUNT; i++) {
                const block = document.createElement('div');
                block.className = 'stack-block';

                // Random horizontal offset for drop effect
                const randomOffset = (Math.random() - 0.5) * 200;

                // Final position in stack
                const finalY = startY + (i * BLOCK_HEIGHT);

                block.style.width = STACK_WIDTH + 'px';
                block.style.height = BLOCK_HEIGHT + 'px';
                block.style.setProperty('--start-x', randomOffset + 'px');
                block.style.setProperty('--end-y', finalY + 'px');
                block.style.animationDelay = (i * STAGGER_DELAY) + 'ms';

                container.appendChild(block);
                blocks.push(block);
            }

            // Dissolve blocks after stacking completes
            const dissolveTime = ANIMATION_DURATION + (BLOCK_COUNT * STAGGER_DELAY) + 200;
            setTimeout(() => {
                blocks.forEach((block) => {
                    block.classList.add('dissolve');
                });
            }, dissolveTime);

            return blocks;
        }

        // Initialize on load
        document.addEventListener('DOMContentLoaded', createStackBlocks);
    </script>
</body>
</html>
