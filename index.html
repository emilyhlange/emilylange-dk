<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins Lange — Product Designer</title>
    <meta name="description" content="Portfolio of Emily Howkins Lange, product designer specialising in Design Systems.">

    <script>
        (function() {
            const s = localStorage.getItem('theme');
            if (s) document.documentElement.setAttribute('data-theme', s);
            else if (matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.setAttribute('data-theme', 'dark');
        }());
    </script>

    <style>
        :root {
            --bg: #F6F6F6;
            --fg: #000;
            --fg-dim: #aaa;
            --border: rgba(0,0,0,0.13);
        }
        [data-theme="dark"] {
            --bg: #111;
            --fg: #f0f0ee;
            --fg-dim: #555;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--fg);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
        }

        /* ── Intro ── */
        #intro {
            position: fixed; inset: 0; z-index: 9000;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #intro.gone { opacity: 0; pointer-events: none; }
        #intro-text { font-size: 12px; letter-spacing: 0.06em; color: var(--fg); }
        #intro-cursor {
            display: inline-block; width: 1px; height: 12px;
            background: var(--fg); margin-left: 2px; vertical-align: middle;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Grain ── */
        .grain {
            position: fixed; inset: -20%; width: 140%; height: 140%;
            pointer-events: none; z-index: 80; opacity: 0.038;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            animation: grain-move 0.18s steps(1) infinite;
        }
        @keyframes grain-move {
            0%  {background-position:0% 0%}   10%{background-position:-5% -10%}
            20% {background-position:-15% 5%}  30%{background-position:7% -25%}
            40% {background-position:-5% 25%}  50%{background-position:-15% 10%}
            60% {background-position:15% -25%} 70%{background-position:0% 15%}
            80% {background-position:3% 35%}   90%{background-position:-18% 10%}
            100%{background-position:0% -20%}
        }

        /* ── Pixel trail ── */
        #trail { position: fixed; inset: 0; pointer-events: none; z-index: 90; }

        /* ── Layout ── */
        #page {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            opacity: 0; transition: opacity 0.45s ease;
        }
        #page.visible { opacity: 1; }

        /* ── Topbar ── */
        .top {
            height: 32px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--fg);
        }
        .top a { color: inherit; text-decoration: none; }
        .top a:hover { color: orangered; }
        .top-sep { opacity: 0.3; margin: 0 6px; }
        #theme-btn {
            background: none; border: none; cursor: pointer;
            font-size: 13px; color: var(--fg); padding: 0 4px;
            opacity: 0.5; transition: opacity 0.2s;
        }
        #theme-btn:hover { opacity: 1; }

        /* ── Identity block ── */
        .identity {
            padding: 0 20px;
            flex-shrink: 0;
            display: flex; align-items: baseline; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            /* Height is 1/3 of remaining space, set by JS */
        }
        .identity-name {
            font-size: clamp(32px, 5.5vw, 72px);
            font-weight: normal;
            letter-spacing: -0.02em;
            line-height: 1;
            color: var(--fg);
        }
        .identity-meta {
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--fg-dim);
            align-self: flex-end;
            padding-bottom: 0.5em;
        }

        /* ── Nav rows ── */
        .nav-rows { flex: 1; display: flex; flex-direction: column; }

        .nav-row {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex; align-items: center;
            padding: 0 20px;
            text-decoration: none;
            color: var(--fg);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }
        .nav-row:last-child { border-bottom: none; }

        /* Fill layer — sweeps left → right */
        .nav-row::before {
            content: '';
            position: absolute; inset: 0;
            transform: scaleX(0);
            transform-origin: left center;
            transition: transform 0.6s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 0;
        }
        .row-portfolio::before { background: #0d0d0d; }
        .row-playground::before { background: #0000ff; }
        .nav-row:hover::before { transform: scaleX(1); }

        /* Content inside row */
        .row-inner {
            position: relative; z-index: 1;
            width: 100%;
            display: flex; align-items: baseline; justify-content: space-between;
            pointer-events: none;
        }

        .row-title {
            font-size: clamp(28px, 4.8vw, 64px);
            font-weight: normal;
            letter-spacing: -0.01em;
            line-height: 1;
            transition: color 0.3s;
        }
        .nav-row:hover .row-title { color: #fff; }

        .row-arrow {
            font-size: clamp(28px, 4.8vw, 64px);
            opacity: 0;
            transform: translateX(-10px);
            transition: opacity 0.25s 0.15s, transform 0.25s 0.15s, color 0.3s;
            color: #fff;
        }
        .nav-row:hover .row-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        .row-meta {
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--fg-dim);
            transition: color 0.3s;
            align-self: flex-end;
            padding-bottom: 0.4em;
        }
        .nav-row:hover .row-meta { color: rgba(255,255,255,0.45); }

        /* Dim sibling row on hover */
        .nav-rows:has(.row-portfolio:hover) .row-playground,
        .nav-rows:has(.row-playground:hover) .row-portfolio {
            opacity: 0.4;
        }
        .nav-rows { }
        .nav-row { transition: opacity 0.3s; }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="intro"><span id="intro-text"></span><span id="intro-cursor"></span></div>
<div class="grain"></div>
<canvas id="trail"></canvas>

<div id="page">

    <div class="top">
        <span style="opacity:0.4;letter-spacing:0.04em">emily-howkins.com</span>
        <div style="display:flex;align-items:center">
            <button id="theme-btn">◐</button>
            <span class="top-sep">·</span>
            <span>Emily Howkins Lange</span>
        </div>
    </div>

    <div class="identity" id="identity">
        <span class="identity-name" id="hero-name">&nbsp;</span>
        <span class="identity-meta">product designer</span>
    </div>

    <div class="nav-rows">

        <a class="nav-row row-portfolio" href="portfolio/">
            <div class="row-inner">
                <span>
                    <span class="row-title" id="label-portfolio">portfolio</span><span class="row-arrow"> →</span>
                </span>
                <span class="row-meta">UX · design systems · product&nbsp;&nbsp;2022—</span>
            </div>
        </a>

        <a class="nav-row row-playground" href="playground/">
            <div class="row-inner">
                <span>
                    <span class="row-title" id="label-playground">playground</span><span class="row-arrow"> →</span>
                </span>
                <span class="row-meta">graphic · experiments · student&nbsp;&nbsp;2018—2021</span>
            </div>
        </a>

    </div>

</div>

<script>
// ── Scramble ─────────────────────────────────────────────
const CHARS = 'abcdefghijklmnopqrstuvwxyz·—–/';
function scrambleTo(el, target, ms) {
    const t0 = performance.now();
    (function f(now) {
        const p = Math.min((now - t0) / ms, 1);
        const settled = Math.floor(p * target.length);
        el.textContent = target.split('').map((c, i) => {
            if (c === ' ') return ' ';
            if (i < settled) return c;
            return CHARS[Math.floor(Math.random() * CHARS.length)];
        }).join('');
        if (p < 1) requestAnimationFrame(f);
        else el.textContent = target;
    })(t0);
}

// Scramble on row hover
['portfolio','playground'].forEach(key => {
    const row   = document.querySelector('.row-' + key);
    const label = document.getElementById('label-' + key);
    const orig  = label.textContent;
    row.addEventListener('mouseenter', () => scrambleTo(label, orig, 400));
});

// ── Intro ────────────────────────────────────────────────
const introEl = document.getElementById('intro');
const introTx = document.getElementById('intro-text');
const page    = document.getElementById('page');
const heroEl  = document.getElementById('hero-name');

function reveal() {
    page.classList.add('visible');
    setTimeout(() => scrambleTo(heroEl, 'Emily Howkins Lange', 700), 100);
}

if (sessionStorage.getItem('intro-seen')) {
    introEl.style.display = 'none';
    reveal();
} else {
    const name = 'emily howkins lange';
    let i = 0;
    (function tick() {
        introTx.textContent = name.slice(0, i++);
        if (i <= name.length) setTimeout(tick, 55 + Math.random() * 60);
        else setTimeout(() => {
            introEl.classList.add('gone');
            sessionStorage.setItem('intro-seen','1');
            setTimeout(() => { introEl.style.display='none'; reveal(); }, 550);
        }, 450);
    })();
}

// ── Pixel trail ───────────────────────────────────────────
(function(){
    const c = document.getElementById('trail');
    const x = c.getContext('2d');
    let W, H;
    const rsz = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
    rsz(); addEventListener('resize', rsz);

    const dark = () => document.documentElement.getAttribute('data-theme') === 'dark';
    const PL = ['#000','#000','#000','#000','#0000ff','#ff4500'];
    const PD = ['#fff','#fff','#fff','#e0e0ff','#0000ff','#ff4500'];
    // On hovered rows use inverted palette
    const hoveredRow = () => document.querySelector('.nav-row:hover');

    let px = [], lx = null, ly = null;
    addEventListener('mousemove', e => {
        const dx = lx != null ? e.clientX - lx : 0;
        const dy = ly != null ? e.clientY - ly : 0;
        const spd = Math.hypot(dx, dy);
        const n = Math.min(4, Math.ceil(spd / 6));
        const row = hoveredRow();
        let pal = dark() ? PD : PL;
        if (row) pal = PD; // always white-ish on filled row
        for (let i=0;i<n;i++) px.push({
            x: e.clientX+(Math.random()-.5)*8,
            y: e.clientY+(Math.random()-.5)*8,
            s: 4, a: 0.85,
            c: pal[Math.floor(Math.random()*pal.length)]
        });
        lx = e.clientX; ly = e.clientY;
    });
    (function draw(){
        x.clearRect(0,0,W,H);
        for(let i=px.length-1;i>=0;i--){
            const p=px[i]; p.a-=0.045;
            if(p.a<=0){px.splice(i,1);continue;}
            x.globalAlpha=p.a; x.fillStyle=p.c;
            x.fillRect(Math.round(p.x),Math.round(p.y),p.s,p.s);
        }
        x.globalAlpha=1; requestAnimationFrame(draw);
    })();
})();

// ── Theme toggle ─────────────────────────────────────────
(function(){
    const btn  = document.getElementById('theme-btn');
    const html = document.documentElement;
    const get  = () => html.getAttribute('data-theme') ||
                       (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const set  = t  => { html.setAttribute('data-theme',t); localStorage.setItem('theme',t); };
    btn.addEventListener('click', () => set(get()==='dark'?'light':'dark'));
})();
</script>
</body>
</html>
