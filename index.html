<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins Lange — Product Designer</title>
    <meta name="description" content="Portfolio of Emily Howkins Lange, product designer specialising in Design Systems.">

    <script>
        (function() {
            const s = localStorage.getItem('theme');
            if (s) document.documentElement.setAttribute('data-theme', s);
            else if (matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.setAttribute('data-theme', 'dark');
        }());
    </script>

    <style>
        :root {
            --bg: #F3F3F0;
            --fg: #000;
            --fg-dim: #999;
            --border: rgba(0,0,0,0.10);
        }
        [data-theme="dark"] {
            --bg: #0e0e0e;
            --fg: #f0f0ee;
            --fg-dim: #555;
            --border: rgba(255,255,255,0.09);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            color: var(--fg);
        }

        /* ── Colorful background ── */
        body {
            background:
                radial-gradient(ellipse 65% 55% at 78% 8%,  rgba(110,130,255,0.16) 0%, transparent 100%),
                radial-gradient(ellipse 55% 45% at 12% 88%, rgba(255,155,90,0.11)  0%, transparent 100%),
                radial-gradient(ellipse 45% 40% at 88% 78%, rgba(120,220,180,0.09) 0%, transparent 100%),
                var(--bg);
        }
        [data-theme="dark"] body {
            background:
                radial-gradient(ellipse 65% 55% at 78% 8%,  rgba(80,100,255,0.14) 0%, transparent 100%),
                radial-gradient(ellipse 55% 45% at 12% 88%, rgba(200,100,50,0.10) 0%, transparent 100%),
                radial-gradient(ellipse 45% 40% at 88% 78%, rgba(60,160,120,0.08) 0%, transparent 100%),
                var(--bg);
        }

        /* ── Cursor light ── */
        #cursor-light {
            position: fixed;
            pointer-events: none;
            width: 520px; height: 520px;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255,255,255,0.22) 0%,
                rgba(200,210,255,0.08) 35%,
                transparent 70%
            );
            left: calc(var(--cx, 50vw) * 1px - 260px);
            top:  calc(var(--cy, 50vh) * 1px - 260px);
            z-index: 1;
            transition: left 0.07s linear, top 0.07s linear;
        }
        [data-theme="dark"] #cursor-light {
            background: radial-gradient(circle,
                rgba(255,255,255,0.12) 0%,
                rgba(180,200,255,0.05) 35%,
                transparent 70%
            );
        }

        /* ── Grain ── */
        .grain {
            position: fixed; inset: -20%; width: 140%; height: 140%;
            pointer-events: none; z-index: 2; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            animation: grain-move 0.18s steps(1) infinite;
        }
        @keyframes grain-move {
            0%{background-position:0 0}     10%{background-position:-5% -10%}
            20%{background-position:-15% 5%} 30%{background-position:7% -25%}
            40%{background-position:-5% 25%} 50%{background-position:-15% 10%}
            60%{background-position:15% -25%}70%{background-position:0 15%}
            80%{background-position:3% 35%}  90%{background-position:-18% 10%}
            100%{background-position:0 -20%}
        }

        /* ── Pixel trail ── */
        #trail { position: fixed; inset: 0; pointer-events: none; z-index: 90; }

        /* ── Intro ── */
        #intro {
            position: fixed; inset: 0; z-index: 9000;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #intro.gone { opacity: 0; pointer-events: none; }
        #intro-text { font-size: 12px; letter-spacing: 0.06em; color: var(--fg); }
        #intro-cursor {
            display: inline-block; width: 1px; height: 12px;
            background: var(--fg); margin-left: 2px; vertical-align: middle;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Page wrapper ── */
        #page {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            opacity: 0; transition: opacity 0.45s;
            z-index: 10;
        }
        #page.visible { opacity: 1; }

        /* ── Topbar ── */
        .topbar {
            height: 32px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            font-size: 11px; color: var(--fg);
            background: rgba(243,243,240,0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        [data-theme="dark"] .topbar {
            background: rgba(14,14,14,0.75);
        }
        .topbar a { color: inherit; text-decoration: none; }
        .topbar a:hover { color: orangered; }
        .nav-sep { opacity: 0.3; margin: 0 6px; }
        .nav-current { font-weight: bold; }
        #theme-btn {
            background: none; border: none; cursor: pointer;
            font-size: 13px; color: var(--fg); padding: 0 4px;
            opacity: 0.5; transition: opacity 0.2s;
        }
        #theme-btn:hover { opacity: 1; }

        /* ── Center container ── */
        .center-wrap {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px;
        }
        .content {
            width: 100%;
            max-width: 860px;
        }

        /* ── Identity ── */
        .identity {
            margin-bottom: 40px;
        }
        .identity-name {
            font-size: clamp(28px, 4vw, 52px);
            font-weight: normal;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: var(--fg);
            display: block;
            margin-bottom: 8px;
        }
        .identity-sub {
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--fg-dim);
        }

        /* ── Glass buttons ── */
        .btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .glass-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 22px 24px 20px;
            min-height: 130px;
            text-decoration: none;
            color: var(--fg);
            border-radius: 3px;
            /* Glass effect */
            background: rgba(255,255,255,0.28);
            backdrop-filter: blur(24px) saturate(1.8);
            -webkit-backdrop-filter: blur(24px) saturate(1.8);
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.65),
                0 4px 24px rgba(0,0,0,0.06),
                0 1px 3px rgba(0,0,0,0.05);
            transition: background 0.22s, box-shadow 0.22s, transform 0.22s;
            overflow: hidden;
        }
        [data-theme="dark"] .glass-btn {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.13);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.08),
                0 4px 24px rgba(0,0,0,0.25);
        }
        .glass-btn:hover {
            background: rgba(255,255,255,0.4);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.75),
                0 10px 40px rgba(0,0,0,0.1),
                0 2px 6px rgba(0,0,0,0.06);
            transform: translateY(-2px);
        }
        [data-theme="dark"] .glass-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Subtle color tint per button on hover */
        .glass-btn-portfolio::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 50%, rgba(30,30,30,0.04) 0%, transparent 70%);
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .glass-btn-playground::after {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 50%, rgba(0,0,255,0.05) 0%, transparent 70%);
            border-radius: 3px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .glass-btn:hover::after { opacity: 1; }

        .btn-inner { position: relative; z-index: 1; }

        .btn-label {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: clamp(18px, 2.4vw, 28px);
            font-weight: normal;
            letter-spacing: -0.01em;
            margin-bottom: 8px;
        }
        .btn-arrow {
            font-size: clamp(18px, 2.4vw, 28px);
            opacity: 0;
            transform: translateX(-5px);
            transition: opacity 0.2s, transform 0.2s;
            display: inline-block;
        }
        .glass-btn:hover .btn-arrow {
            opacity: 1; transform: translateX(0);
        }

        .btn-desc {
            font-size: 10px;
            letter-spacing: 0.08em;
            color: var(--fg-dim);
            line-height: 1.5;
        }

        .btn-year {
            font-size: 9px;
            letter-spacing: 0.1em;
            color: var(--fg-dim);
            opacity: 0.6;
            margin-top: 14px;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- Cursor light layer -->
<div id="cursor-light"></div>

<!-- Atmospheric grain -->
<div class="grain"></div>

<!-- Pixel trail -->
<canvas id="trail"></canvas>

<!-- Intro -->
<div id="intro"><span id="intro-text"></span><span id="intro-cursor"></span></div>

<!-- Page -->
<div id="page">

    <div class="topbar">
        <div style="display:flex;align-items:center">
            <span class="nav-current">home</span>
            <span class="nav-sep">·</span>
            <a href="portfolio/">portfolio</a>
            <span class="nav-sep">·</span>
            <a href="playground/">playground</a>
        </div>
        <div style="display:flex;align-items:center">
            <button id="theme-btn">◐</button>
            <span class="nav-sep">·</span>
            <span>Emily Howkins Lange</span>
        </div>
    </div>

    <div class="center-wrap">
        <div class="content">

            <div class="identity">
                <span class="identity-name" id="hero-name">&nbsp;</span>
                <span class="identity-sub">product designer</span>
            </div>

            <div class="btn-row">

                <a class="glass-btn glass-btn-portfolio" href="portfolio/">
                    <div class="btn-inner">
                        <div class="btn-label">portfolio<span class="btn-arrow">→</span></div>
                        <div class="btn-desc">UX · design systems · product design</div>
                    </div>
                    <div class="btn-year">2022 — present</div>
                </a>

                <a class="glass-btn glass-btn-playground" href="playground/">
                    <div class="btn-inner">
                        <div class="btn-label">playground<span class="btn-arrow">→</span></div>
                        <div class="btn-desc">graphic design · experiments · student work</div>
                    </div>
                    <div class="btn-year">2018 — 2021</div>
                </a>

            </div>

        </div>
    </div>

</div>

<script>
// ── Cursor light ─────────────────────────────────────────
const light = document.getElementById('cursor-light');
document.addEventListener('mousemove', e => {
    light.style.left = (e.clientX - 260) + 'px';
    light.style.top  = (e.clientY - 260) + 'px';
});

// ── Scramble ─────────────────────────────────────────────
const CHARS = 'abcdefghijklmnopqrstuvwxyz·—/';
function scrambleTo(el, target, ms) {
    const t0 = performance.now();
    (function f(now) {
        const p = Math.min((now - t0) / ms, 1);
        const settled = Math.floor(p * target.length);
        el.textContent = target.split('').map((c,i) => {
            if (c === ' ') return ' ';
            if (i < settled) return c;
            return CHARS[Math.floor(Math.random() * CHARS.length)];
        }).join('');
        if (p < 1) requestAnimationFrame(f);
        else el.textContent = target;
    })(t0);
}

// ── Intro ────────────────────────────────────────────────
const introEl = document.getElementById('intro');
const introTx = document.getElementById('intro-text');
const page    = document.getElementById('page');
const heroEl  = document.getElementById('hero-name');

function reveal() {
    page.classList.add('visible');
    setTimeout(() => scrambleTo(heroEl, 'Emily Howkins Lange', 650), 80);
}

if (sessionStorage.getItem('intro-seen')) {
    introEl.style.display = 'none';
    reveal();
} else {
    const name = 'emily howkins lange';
    let i = 0;
    (function tick() {
        introTx.textContent = name.slice(0, i++);
        if (i <= name.length) setTimeout(tick, 55 + Math.random() * 60);
        else setTimeout(() => {
            introEl.classList.add('gone');
            sessionStorage.setItem('intro-seen', '1');
            setTimeout(() => { introEl.style.display = 'none'; reveal(); }, 520);
        }, 420);
    })();
}

// ── Pixel trail ───────────────────────────────────────────
(function(){
    const c = document.getElementById('trail');
    const ctx = c.getContext('2d');
    let W, H;
    const rsz = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
    rsz(); addEventListener('resize', rsz);
    const dark = () => document.documentElement.getAttribute('data-theme') === 'dark';
    const PL = ['#000','#000','#000','#000','#0000ff','#ff4500'];
    const PD = ['#fff','#fff','#fff','#e0e0ff','#0000ff','#ff4500'];
    let px = [], lx = null, ly = null;
    addEventListener('mousemove', e => {
        const spd = lx != null ? Math.hypot(e.clientX-lx, e.clientY-ly) : 0;
        const n = Math.min(4, Math.ceil(spd / 6));
        const pal = dark() ? PD : PL;
        for (let i=0;i<n;i++) px.push({
            x: e.clientX+(Math.random()-.5)*8, y: e.clientY+(Math.random()-.5)*8,
            s: 4, a: 0.8, c: pal[Math.floor(Math.random()*pal.length)]
        });
        lx = e.clientX; ly = e.clientY;
    });
    (function draw(){
        ctx.clearRect(0,0,W,H);
        for (let i=px.length-1;i>=0;i--) {
            const p=px[i]; p.a-=0.045;
            if(p.a<=0){px.splice(i,1);continue;}
            ctx.globalAlpha=p.a; ctx.fillStyle=p.c;
            ctx.fillRect(Math.round(p.x),Math.round(p.y),p.s,p.s);
        }
        ctx.globalAlpha=1; requestAnimationFrame(draw);
    })();
})();

// ── Dark mode ─────────────────────────────────────────────
(function(){
    const btn  = document.getElementById('theme-btn');
    const html = document.documentElement;
    const get  = () => html.getAttribute('data-theme') ||
                       (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const set  = t  => { html.setAttribute('data-theme',t); localStorage.setItem('theme',t); };
    btn.addEventListener('click', () => set(get()==='dark'?'light':'dark'));
})();
</script>
</body>
</html>
