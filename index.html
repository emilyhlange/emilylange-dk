<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins Lange — Product Designer</title>
    <meta name="description" content="Portfolio of Emily Howkins Lange, product designer specialising in Design Systems.">

    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.setAttribute('data-theme', 'dark');
        }());
    </script>

    <style>
        :root {
            --bg: #F6F6F6;
            --fg: #000;
            --fg-dim: #999;
            --border: rgba(0,0,0,0.12);
        }
        [data-theme="dark"] {
            --bg: #111;
            --fg: #f0f0ee;
            --fg-dim: #666;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            background: var(--bg);
            color: var(--fg);
        }

        /* ── Intro ── */
        #intro {
            position: fixed; inset: 0; z-index: 9000;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.55s ease;
        }
        #intro.fade-out { opacity: 0; pointer-events: none; }
        #intro-text {
            font-size: 12px;
            letter-spacing: 0.06em;
            color: var(--fg);
        }
        #intro-cursor {
            display: inline-block; width: 1px; height: 12px;
            background: var(--fg);
            margin-left: 2px; vertical-align: middle;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Grain ── */
        .grain {
            position: fixed; inset: -20%; width: 140%; height: 140%;
            pointer-events: none; z-index: 80; opacity: 0.038;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            animation: grain-drift 0.18s steps(1) infinite;
        }
        @keyframes grain-drift {
            0%  { background-position:   0%   0%; }
            10% { background-position: -5%  -10%; }
            20% { background-position: -15%   5%; }
            30% { background-position:  7%  -25%; }
            40% { background-position: -5%   25%; }
            50% { background-position: -15%  10%; }
            60% { background-position:  15% -25%; }
            70% { background-position:  0%   15%; }
            80% { background-position:  3%   35%; }
            90% { background-position: -18%  10%; }
           100% { background-position:  0%  -20%; }
        }

        /* ── Pixel trail ── */
        #trail-canvas {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 90;
        }

        /* ── Topbar ── */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 32px; z-index: 200;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px;
            font-size: 11px;
            background: transparent;
            pointer-events: none;
        }
        .top-bar-left {
            color: var(--fg);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: all;
        }
        .top-bar-left.visible { opacity: 0.45; }
        .top-bar-right {
            display: flex; align-items: center; gap: 0;
            color: var(--fg);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: all;
        }
        .top-bar-right.visible { opacity: 1; }
        .nav-sep { opacity: 0.35; margin: 0 6px; }
        #theme-btn {
            background: none; border: none; cursor: pointer;
            font-size: 13px; color: var(--fg);
            padding: 0 6px; line-height: 1; opacity: 0.55;
            transition: opacity 0.2s;
        }
        #theme-btn:hover { opacity: 1; }

        /* ── Split screen ── */
        .split {
            position: fixed; inset: 0;
            display: flex;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .split.visible { opacity: 1; }

        /* The divider line */
        .split-line {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 1px;
            background: var(--border);
            z-index: 5;
            transform-origin: center;
            transition: background 0.4s, transform 0.4s;
        }

        /* Each half */
        .half {
            flex: 1;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: var(--fg);
        }

        /* Animated fill layer */
        .half::before {
            content: '';
            position: absolute; inset: 0;
            transform: scaleY(0);
            transform-origin: bottom center;
            transition: transform 0.55s cubic-bezier(0.76, 0, 0.24, 1);
            z-index: 0;
        }
        .half-left::before  { background: #0d0d0d; }
        .half-right::before { background: #0000ff; }

        .half:hover::before { transform: scaleY(1); }

        /* Dim the OTHER half when one is hovered */
        .split:has(.half-left:hover) .half-right,
        .split:has(.half-right:hover) .half-left {
            opacity: 0.35;
        }
        .split:has(.half-left:hover) .split-line,
        .split:has(.half-right:hover) .split-line {
            opacity: 0.3;
        }
        .half { transition: opacity 0.3s; }

        /* Content inside each half */
        .half-inner {
            position: relative; z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        /* The big label */
        .half-label {
            display: block;
            font-size: clamp(28px, 5vw, 64px);
            font-weight: normal;
            letter-spacing: -0.01em;
            line-height: 1;
            color: var(--fg);
            transition: color 0.35s;
            /* Scramble animation handled by JS */
        }
        .half:hover .half-label { color: #fff; }

        /* Arrow that appears on hover */
        .half-arrow {
            display: inline-block;
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity 0.3s 0.15s, transform 0.3s 0.15s;
            font-size: clamp(28px, 5vw, 64px);
            color: #fff;
        }
        .half:hover .half-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* Subtitle */
        .half-sub {
            display: block;
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--fg-dim);
            margin-top: 14px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.3s 0.1s, transform 0.3s 0.1s, color 0.3s;
        }
        .half:hover .half-sub {
            opacity: 0.7;
            transform: translateY(0);
            color: rgba(255,255,255,0.6);
        }

        /* Center name — floats at the split line */
        .center-name {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            font-size: 11px;
            letter-spacing: 0.08em;
            color: var(--fg-dim);
            pointer-events: none;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s;
            writing-mode: vertical-rl;
            text-orientation: mixed;
        }
        .center-name.visible { opacity: 0.4; }

        /* Nudge name toward hovered side */
        .split:has(.half-left:hover)  ~ .center-name { transform: translate(calc(-50% - 20px), -50%); opacity: 0 !important; }
        .split:has(.half-right:hover) ~ .center-name { transform: translate(calc(-50% + 20px), -50%); opacity: 0 !important; }

        /* Year tag at bottom of each half */
        .half-year {
            position: absolute;
            bottom: 28px;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--fg-dim);
            opacity: 0;
            transition: opacity 0.3s 0.2s, color 0.3s;
            z-index: 2;
        }
        .half:hover .half-year {
            opacity: 0.5;
            color: rgba(255,255,255,0.4);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: blue; }
    </style>
</head>
<body>

<!-- Intro -->
<div id="intro">
    <span id="intro-text"></span><span id="intro-cursor"></span>
</div>

<!-- Grain -->
<div class="grain"></div>

<!-- Pixel trail -->
<canvas id="trail-canvas"></canvas>

<!-- Topbar -->
<div class="top-bar">
    <span class="top-bar-left" id="topbar-left">emily-howkins.com</span>
    <div class="top-bar-right" id="topbar-right">
        <button id="theme-btn">◐</button>
        <span class="nav-sep">·</span>
        <span>Emily Howkins Lange</span>
    </div>
</div>

<!-- Split screen -->
<div class="split" id="split">

    <div class="split-line"></div>

    <a class="half half-left" href="portfolio/" id="half-left">
        <div class="half-inner">
            <span class="half-label" id="label-left">portfolio</span>
            <span class="half-arrow">&nbsp;→</span>
            <span class="half-sub">UX · design systems · product</span>
        </div>
        <span class="half-year">2022 — present</span>
    </a>

    <a class="half half-right" href="playground/" id="half-right">
        <div class="half-inner">
            <span class="half-label" id="label-right">playground</span>
            <span class="half-arrow">&nbsp;→</span>
            <span class="half-sub">graphic · experiments · student work</span>
        </div>
        <span class="half-year">2018 — 2021</span>
    </a>

</div>

<!-- Vertical name at center -->
<div class="center-name" id="center-name">Emily Howkins Lange</div>

<script>
// ── Scramble ──────────────────────────────────────────────────────────────
const CHARS = 'abcdefghijklmnopqrstuvwxyz–—·/';

function scrambleTo(el, target, duration) {
    const start = performance.now();
    const len = target.length;
    function frame(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const settled = Math.floor(progress * len);
        let out = '';
        for (let i = 0; i < len; i++) {
            if (target[i] === ' ') { out += ' '; continue; }
            if (i < settled) { out += target[i]; continue; }
            out += CHARS[Math.floor(Math.random() * CHARS.length)];
        }
        el.textContent = out;
        if (progress < 1) requestAnimationFrame(frame);
        else el.textContent = target;
    }
    requestAnimationFrame(frame);
}

// ── Hover scramble on half labels ────────────────────────────────────────
['left', 'right'].forEach(side => {
    const half  = document.getElementById('half-' + side);
    const label = document.getElementById('label-' + side);
    const orig  = label.textContent;
    let timer;
    half.addEventListener('mouseenter', () => {
        clearTimeout(timer);
        scrambleTo(label, orig, 380);
    });
});

// ── Intro sequence ───────────────────────────────────────────────────────
const introEl   = document.getElementById('intro');
const introText = document.getElementById('intro-text');
const split     = document.getElementById('split');
const topL      = document.getElementById('topbar-left');
const topR      = document.getElementById('topbar-right');
const cn        = document.getElementById('center-name');

function revealPage() {
    split.classList.add('visible');
    topL.classList.add('visible');
    topR.classList.add('visible');
    setTimeout(() => cn.classList.add('visible'), 300);
}

const seen = sessionStorage.getItem('intro-seen');
if (seen) {
    introEl.style.display = 'none';
    revealPage();
} else {
    const name = 'emily howkins lange';
    let i = 0;
    function typeNext() {
        if (i <= name.length) {
            introText.textContent = name.slice(0, i);
            i++;
            setTimeout(typeNext, 55 + Math.random() * 60);
        } else {
            setTimeout(() => {
                introEl.classList.add('fade-out');
                sessionStorage.setItem('intro-seen', '1');
                setTimeout(() => {
                    introEl.style.display = 'none';
                    revealPage();
                }, 600);
            }, 500);
        }
    }
    setTimeout(typeNext, 200);
}

// ── Pixel trail ───────────────────────────────────────────────────────────
(function() {
    const canvas = document.getElementById('trail-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';
    const PAL_LIGHT = ['#000','#000','#000','#000','#0000ff','#ff4500'];
    const PAL_DARK  = ['#fff','#fff','#fff','#e0e0ff','#0000ff','#ff4500'];

    // Special: on the dark half, use white pixels
    let pixels = [], lx = null, ly = null;

    document.addEventListener('mousemove', e => {
        const x = e.clientX, y = e.clientY;
        const spd = lx != null ? Math.hypot(x - lx, y - ly) : 0;
        const n = Math.min(4, Math.ceil(spd / 6));

        // Detect which half we're on for pixel color
        const onLeft = x < window.innerWidth / 2;
        const leftHovered = document.querySelector('.half-left:hover');
        const rightHovered = document.querySelector('.half-right:hover');
        let pal;
        if ((onLeft && leftHovered) || (!onLeft && rightHovered)) {
            pal = PAL_DARK; // on filled dark/blue side
        } else {
            pal = isDark() ? PAL_DARK : PAL_LIGHT;
        }

        for (let i = 0; i < n; i++) {
            pixels.push({
                x: x + (Math.random()-0.5)*8, y: y + (Math.random()-0.5)*8,
                s: 4, alpha: 0.85,
                color: pal[Math.floor(Math.random() * pal.length)]
            });
        }
        lx = x; ly = y;
    });

    (function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = pixels.length-1; i >= 0; i--) {
            const p = pixels[i];
            p.alpha -= 0.045;
            if (p.alpha <= 0) { pixels.splice(i,1); continue; }
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.fillRect(Math.round(p.x), Math.round(p.y), p.s, p.s);
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
    })();
})();

// ── Dark mode toggle ─────────────────────────────────────────────────────
(function() {
    const btn  = document.getElementById('theme-btn');
    const html = document.documentElement;
    const get  = () => html.getAttribute('data-theme') ||
                       (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const set  = t => { html.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
    btn.addEventListener('click', () => set(get() === 'dark' ? 'light' : 'dark'));
})();
</script>

</body>
</html>
