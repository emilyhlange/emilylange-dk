<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <script>
        (function(){
            var s=localStorage.getItem('theme');
            if(s) document.documentElement.setAttribute('data-theme',s);
            else if(matchMedia('(prefers-color-scheme:dark)').matches)
                document.documentElement.setAttribute('data-theme','dark');
        }());
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins — Product Designer</title>
    <meta name="description" content="Product designer specialising in Design Systems. Portfolio, playground, and 11 hidden mini-games.">

    <!-- Open Graph -->
    <meta property="og:title" content="Emily Howkins — Product Designer">
    <meta property="og:description" content="Portfolio, playground, and 11 hidden mini-games. Design systems by day, creative experiments by night.">
    <meta property="og:image" content="https://emily-howkins.com/images/og-preview.jpg">
    <meta property="og:url" content="https://emily-howkins.com">
    <meta property="og:type" content="website">

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Emily Howkins — Product Designer">
    <meta name="twitter:description" content="Portfolio, playground, and 11 hidden mini-games.">
    <meta name="twitter:image" content="https://emily-howkins.com/images/og-preview.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f3f1;
            --fg: #1a1a1a;
            --fg-dim: #777;
            --border: #ddd;
        }
        [data-theme="dark"] {
            --bg: #111111;
            --fg: #e8e8e8;
            --fg-dim: #888;
            --border: #2a2a2a;
        }

        * { margin:0; padding:0; box-sizing:border-box; cursor:none; user-select:none; -webkit-user-select:none; }
        a, button { cursor:none; }

        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px;
            color: var(--fg);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Custom cursor ── */
        #cursor-dot {
            position:fixed; pointer-events:none; z-index:10000;
            width:7px; height:7px; background:var(--fg);
            border-radius:50%; transform:translate(-50%,-50%);
            transition: width 0.2s, height 0.2s;
        }
        #cursor-ring {
            position:fixed; pointer-events:none; z-index:9999;
            width:36px; height:36px;
            border:1.5px solid var(--fg); border-radius:50%;
            transform:translate(-50%,-50%); opacity:0.35;
            transition: width 0.25s, height 0.25s, opacity 0.25s;
        }
        body.cursor-hover #cursor-dot { width:10px; height:10px; }
        body.cursor-hover #cursor-ring { width:50px; height:50px; opacity:0.5; }
        body.game-mode #cursor-ring { width:28px; height:28px; opacity:0.25; }

        /* Trailing image trail — drop and fade */
        .cursor-trail-img {
            position:fixed; pointer-events:none; z-index:9998;
            width:48px; height:62px;
            object-fit:cover; border-radius:2px;
            opacity:0;
            filter:grayscale(1) contrast(1.05);
            will-change:transform,opacity;
            transition:opacity 0.5s ease;
        }
        body.game-mode .cursor-trail-img { opacity:0 !important; }

        /* ── Loader ── */
        #loader {
            position:fixed; inset:0; z-index:9000;
            background:var(--bg);
            display:flex; align-items:center; justify-content:center;
            perspective:1200px;
        }
        #loader.done { opacity:0; pointer-events:none; transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1); }

        .stack-img {
            position:absolute; width:180px; height:180px;
            object-fit:cover; border-radius:3px;
            opacity:0; transform:scale(0.7);
            transition:opacity 0.3s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
            filter:grayscale(1) contrast(1.05);
        }
        .stack-img.visible { opacity:1; transform:scale(1); }

        #cube-wrap {
            width:180px; height:180px; perspective:1200px;
            position:absolute; opacity:0; transition:opacity 0.5s ease;
        }
        #cube-wrap.visible { opacity:1; }
        #cube {
            width:100%; height:100%; position:relative;
            transform-style:preserve-3d;
            animation:cube-spin 4s linear infinite;
        }
        @keyframes cube-spin {
            0%   { transform:rotateY(0deg) rotateX(15deg); }
            100% { transform:rotateY(360deg) rotateX(15deg); }
        }
        .cube-face {
            position:absolute; width:180px; height:180px;
            backface-visibility:hidden;
        }
        .cube-face img { width:100%; height:100%; object-fit:cover; border-radius:3px; filter:grayscale(1) contrast(1.05); }
        .cube-face:nth-child(1) { transform:rotateY(0deg) translateZ(90px); }
        .cube-face:nth-child(2) { transform:rotateY(90deg) translateZ(90px); }
        .cube-face:nth-child(3) { transform:rotateY(180deg) translateZ(90px); }
        .cube-face:nth-child(4) { transform:rotateY(270deg) translateZ(90px); }
        .cube-face:nth-child(5) { transform:rotateX(90deg) translateZ(90px); }
        .cube-face:nth-child(6) { transform:rotateX(-90deg) translateZ(90px); }

        /* ── Grain ── */
        .grain {
            position:fixed; inset:-20%; width:140%; height:140%;
            pointer-events:none; z-index:5; opacity:0.028;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size:200px 200px;
            animation:grain-move 0.18s steps(1) infinite;
        }
        @keyframes grain-move {
            0%{background-position:0 0}10%{background-position:-5% -10%}
            20%{background-position:-15% 5%}30%{background-position:7% -25%}
            40%{background-position:-5% 25%}50%{background-position:-15% 10%}
            60%{background-position:15% -25%}70%{background-position:0 15%}
            80%{background-position:3% 35%}90%{background-position:-18% 10%}
            100%{background-position:0 -20%}
        }

        /* ── Big name (shows center, then morphs to final position mid-left) ── */
        #hero-name {
            position:fixed; z-index:50;
            pointer-events:none; opacity:0;
            /* start centered */
            top:50%; left:50%;
            transform:translate(-50%,-50%);
        }
        #hero-name.visible { opacity:1; transition:opacity 0.5s ease; }
        #hero-name .name-inner {
            font-size:clamp(48px, 8vw, 110px);
            font-weight:700; letter-spacing:-0.03em; line-height:1;
            white-space:nowrap;
            overflow:hidden;
        }
        #hero-name .name-inner span {
            display:inline-block;
            transform:translateY(110%);
            transition:transform 0.9s cubic-bezier(0.16,1,0.3,1);
        }
        #hero-name.visible .name-inner span { transform:translateY(0); }

        /* ── Page — split layout ── */
        #page {
            position:fixed; inset:0; z-index:10;
            display:flex; opacity:0;
        }
        #page.visible { opacity:1; transition:opacity 0.6s ease; }

        /* Left panel — identity */
        .panel-left {
            width:42%; min-width:320px;
            display:flex; flex-direction:column;
            justify-content:center;
            padding:40px 48px;
            gap:0;
        }
        /* Name placeholder — invisible until hero-name morphs here */
        .id-name-placeholder {
            font-size:clamp(28px, 3.5vw, 48px);
            font-weight:700; letter-spacing:-0.02em;
            line-height:1.05; margin-bottom:12px;
            visibility:hidden; /* space reserved, hero-name overlays */
        }
        .id-role {
            font-size:10px; letter-spacing:0.06em;
            color:var(--fg-dim); margin-bottom:6px;
            opacity:0; transform:translateY(12px);
            transition:opacity 0.5s ease 0.35s, transform 0.5s ease 0.35s;
        }
        #page.visible .id-role { opacity:1; transform:translateY(0); }
        .id-detail {
            font-size:10px; letter-spacing:0.04em;
            color:var(--fg-dim); margin-bottom:20px;
            opacity:0; transform:translateY(12px);
            transition:opacity 0.5s ease 0.45s, transform 0.5s ease 0.45s;
        }
        #page.visible .id-detail { opacity:1; transform:translateY(0); }
        .enter-btn {
            display:inline-flex; align-items:center; gap:6px;
            padding:7px 14px;
            border:1px solid var(--border); border-radius:5px;
            font-size:11px; font-weight:500; letter-spacing:0.01em;
            color:var(--fg); text-decoration:none; font-family:inherit;
            background:none;
            transition:background 0.15s, border-color 0.15s;
            opacity:0; transform:translateY(12px);
            transition:opacity 0.5s ease 0.55s, transform 0.5s ease 0.55s,
                       background 0.15s, border-color 0.15s;
            align-self:flex-start;
        }
        #page.visible .enter-btn { opacity:1; transform:translateY(0); }
        .enter-btn:hover { border-color:var(--fg-dim); }
        .enter-btn .arrow {
            display:inline-block; font-size:13px;
            transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
        }
        .enter-btn:hover .arrow { transform:translateX(3px); }

        /* Right panel — play area with vertical carousel, vertically centered */
        .panel-right {
            flex:1;
            display:flex; flex-direction:column;
            justify-content:center;
            align-items:flex-end;
            padding:40px 60px;
        }

        /* Vertical carousel — shows ~5 items, clips overflow, scrolls active to center */
        .play-carousel-wrap {
            display:flex; flex-direction:column;
            align-items:flex-end;
            opacity:0; transform:translateY(12px);
            transition:opacity 0.5s ease 0.6s, transform 0.5s ease 0.6s;
        }
        #page.visible .play-carousel-wrap { opacity:1; transform:translateY(0); }
        .play-carousel {
            display:flex; flex-direction:column;
            align-items:flex-end;
            position:relative;
            height:240px;
            overflow:hidden;
            padding-left:28px;
        }
        /* Fade edges */
        .play-carousel::before, .play-carousel::after {
            content:''; position:absolute; left:0; right:0; height:30px; z-index:2;
            pointer-events:none;
        }
        .play-carousel::before { top:0; background:linear-gradient(var(--bg), transparent); }
        .play-carousel::after { bottom:0; background:linear-gradient(transparent, var(--bg)); }
        .carousel-track {
            display:flex; flex-direction:column;
            align-items:flex-end;
            gap:4px;
            transition:transform 0.45s cubic-bezier(0.16,1,0.3,1);
            padding:30px 0;
        }
        /* Arrow buttons — above and below carousel */
        .carousel-arrow {
            display:flex; align-items:center; justify-content:center;
            align-self:flex-end;
            width:28px; height:28px;
            background:none; border:1px solid var(--border); border-radius:50%;
            color:var(--fg-dim); font-family:inherit;
            transition:border-color 0.2s, color 0.2s, opacity 0.2s;
        }
        .carousel-arrow:hover { border-color:var(--fg); color:var(--fg); }
        .carousel-arrow.disabled { opacity:0.15; pointer-events:none; }
        .carousel-arrow svg { width:12px; height:12px; }
        .arrow-up { margin-bottom:6px; }
        .arrow-down { margin-top:6px; }
        .play-tool {
            background:none; border:none;
            padding:4px 8px 4px 0; font-family:inherit;
            font-size:14px; font-weight:400;
            color:var(--fg-dim); text-align:right;
            letter-spacing:0;
            transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
            white-space:nowrap;
            line-height:1.3;
            opacity:0.4;
        }
        .play-tool:hover { color:var(--fg); opacity:0.8; }
        .play-tool.active {
            font-size:clamp(18px, 2.2vw, 28px);
            font-weight:600;
            letter-spacing:-0.01em;
            color:var(--fg);
            opacity:1;
            padding:4px 0;
            position:relative;
        }
        /* Playing state — red name + bright animated dot */
        body.game-mode .play-tool.active {
            color:#ff4040;
        }
        body.game-mode .play-tool.active::before {
            content:'';
            position:absolute;
            right:calc(100% + 10px); top:50%;
            width:10px; height:10px;
            background:#ff4040;
            border-radius:50%;
            transform:translateY(-50%);
            animation:pulse-dot 1.5s ease-in-out infinite;
            box-shadow:0 0 8px rgba(255,64,64,0.5);
        }
        @keyframes pulse-dot {
            0%,100% { opacity:1; transform:translateY(-50%) scale(1); }
            50% { opacity:0.5; transform:translateY(-50%) scale(0.75); }
        }
        /* Paused label — subtle, top-left, doesn't block nav */
        #pause-label {
            position:fixed; top:28px; left:36px; z-index:20;
            font-size:10px; font-weight:500; letter-spacing:0;
            text-transform:uppercase;
            color:var(--fg-dim); opacity:0;
            pointer-events:none;
            transition:opacity 0.3s ease;
        }
        #pause-label.visible { opacity:0.6; }
        .play-tool.near {
            font-size:clamp(13px, 1.2vw, 16px);
            opacity:0.6;
        }
        /* Keyboard hint — visible below carousel */
        .carousel-hint {
            margin-top:24px; text-align:right;
            font-size:11px; letter-spacing:0;
            color:var(--fg-dim); opacity:0.75;
            line-height:1.8;
        }
        .carousel-hint kbd {
            display:inline-block;
            padding:2px 7px;
            border:1px solid rgba(255,64,64,0.3);
            border-radius:4px;
            font-family:inherit; font-size:10px;
            margin:0 2px;
            background:rgba(255,64,64,0.06);
            color:#ff4040;
        }
        .carousel-hint .separator { margin:0 5px; opacity:0.35; }

        /* Dark mode toggle — subtle top-right */
        .theme-toggle {
            position:fixed; top:28px; right:36px; z-index:60;
            background:none; border:none; font-family:inherit;
            font-size:10px; letter-spacing:0; color:var(--fg-dim);
            transition:color 0.15s;
            opacity:0;
        }
        #page.visible ~ .theme-toggle, .theme-toggle.visible { opacity:1; transition:opacity 0.5s ease 0.8s, color 0.15s; }
        .theme-toggle:hover { color:var(--fg); }

        /* ── Game canvas ── */
        #trail { position:fixed; inset:0; pointer-events:none; z-index:4; }

        /* ── Score ── */
        #snake-score {
            position:fixed; top:28px; left:50%; transform:translateX(-50%);
            font-size:10px; letter-spacing:0;
            color:var(--fg); opacity:0; pointer-events:none;
            transition:opacity 0.2s; z-index:20;
        }
        #snake-score.visible { opacity:0.7; }

        /* ── Draw palette — brighter colors ── */
        #draw-palette {
            position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
            display:none; gap:8px; align-items:center; z-index:20;
            padding:10px 20px; background:var(--bg);
            border:1px solid var(--fg-dim); border-radius:24px;
            box-shadow:0 2px 12px rgba(0,0,0,0.1);
        }
        #draw-palette.visible { display:flex; }
        .palette-dot {
            width:20px; height:20px; border-radius:50%;
            border:2px solid transparent;
            transition:border-color 0.15s, transform 0.15s;
        }
        .palette-dot:hover { transform:scale(1.2); }
        .palette-dot.active { border-color:var(--fg); }
        .palette-size {
            padding:4px 8px; display:flex; align-items:center; justify-content:center;
            border-radius:12px; border:1px solid var(--border);
            margin-left:4px; font-size:9px; color:var(--fg-dim);
            transition:border-color 0.15s, background 0.15s;
            background:none;
        }
        .palette-size:hover, .palette-size.active { border-color:var(--fg); color:var(--fg); background:rgba(128,128,128,0.08); }
        .palette-save {
            margin-left:8px; padding:3px 10px;
            border:1px solid var(--border); border-radius:10px;
            background:none; font-family:inherit; font-size:9px;
            letter-spacing:0; color:var(--fg-dim);
            transition:border-color 0.15s, color 0.15s;
        }
        .palette-save:hover { border-color:var(--fg); color:var(--fg); }
        .palette-save.saved { border-color:var(--fg); color:var(--fg); }
        /* Toast notification */
        #save-toast {
            position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
            padding:6px 16px; border-radius:16px;
            background:var(--fg); color:var(--bg);
            font-size:10px; letter-spacing:0;
            opacity:0; pointer-events:none;
            transition:opacity 0.3s ease;
            z-index:100;
        }
        #save-toast.visible { opacity:1; }

        ::-webkit-scrollbar { display:none; }

        /* ══ MOBILE ══ */
        @media (max-width: 768px) {
            /* Restore normal cursor on touch devices */
            *, *::before, *::after { cursor:auto !important; }
            #cursor-dot, #cursor-ring, .cursor-trail-img { display:none !important; }

            html, body { overflow:auto; overflow-x:hidden; height:auto; }

            /* Stack panels vertically */
            #page {
                position:relative; inset:auto;
                flex-direction:column;
                min-height:100vh; min-height:100dvh;
            }

            .panel-left {
                width:100%; min-width:0;
                padding:80px 28px 32px;
                justify-content:flex-start;
            }

            .id-name-placeholder {
                font-size:clamp(28px, 10vw, 44px);
            }

            .panel-right {
                width:100%;
                padding:0 28px 40px;
                align-items:flex-start;
            }

            .play-carousel-wrap { align-items:flex-start; }
            .play-carousel { align-items:flex-start; height:200px; padding-left:0; }
            .carousel-track { align-items:flex-start; }
            .play-tool { text-align:left; padding:4px 0 4px 8px; }

            .carousel-arrow { align-self:flex-start; }
            .carousel-hint { text-align:left; font-size:10px; }

            /* Dark mode toggle */
            .theme-toggle { top:20px; right:20px; }

            /* Pause label */
            #pause-label { top:20px; left:20px; }

            /* Game canvas — full screen overlay on mobile */
            body.game-mode #page { display:none; }

            /* Score */
            #snake-score { top:20px; }

            /* Draw palette */
            #draw-palette { bottom:24px; padding:8px 16px; }

            /* Loader adjustments */
            #loader { padding:20px; }
            .stack-img { width:140px; height:140px; }
            #cube-wrap { width:140px; height:140px; }
            .cube-face { width:140px; height:140px; }
            .cube-face:nth-child(1) { transform:rotateY(0deg) translateZ(70px); }
            .cube-face:nth-child(2) { transform:rotateY(90deg) translateZ(70px); }
            .cube-face:nth-child(3) { transform:rotateY(180deg) translateZ(70px); }
            .cube-face:nth-child(4) { transform:rotateY(270deg) translateZ(70px); }

            /* Hero name */
            #hero-name .name-inner { font-size:clamp(36px, 12vw, 60px); }
        }
    </style>
</head>
<body>

<!-- Custom cursor -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<div id="cursor-trail"></div>

<!-- Grain -->
<div class="grain"></div>
<canvas id="trail"></canvas>
<div id="snake-score">Score: <span id="snake-score-val">0</span></div>

<!-- Loader -->
<div id="loader">
    <img class="stack-img" src="images/analog/sq_img20211113_13274114.jpg" alt="">
    <img class="stack-img" src="images/analog/sq_img20211113_13274143.jpg" alt="">
    <img class="stack-img" src="images/analog/sq_img20211113_13274190.jpg" alt="">
    <img class="stack-img" src="images/analog/sq_img20211113_13274382.jpg" alt="">
    <img class="stack-img" src="images/analog/sq_ANALOGt41.jpg" alt="">
    <img class="stack-img" src="images/analog/sq_ANALOGt43.jpg" alt="">
    <div id="cube-wrap">
        <div id="cube">
            <div class="cube-face"><img src="images/analog/sq_img20211113_13274114.jpg" alt=""></div>
            <div class="cube-face"><img src="images/analog/sq_ANALOGt43.jpg" alt=""></div>
            <div class="cube-face"><img src="images/analog/sq_ANALOGt41.jpg" alt=""></div>
            <div class="cube-face"><img src="images/analog/sq_img20211113_13274382.jpg" alt=""></div>
            <div class="cube-face"><img src="images/analog/sq_img20211113_13274143.jpg" alt=""></div>
            <div class="cube-face"><img src="images/analog/sq_img20211113_13274190.jpg" alt=""></div>
        </div>
    </div>
</div>

<!-- Hero name (center, appears after loader, then animates to split) -->
<div id="hero-name">
    <div class="name-inner"><span>Emily Howkins</span></div>
</div>

<!-- Page — split layout -->
<div id="page">
    <div class="panel-left">
        <div class="id-name-placeholder" id="name-target">Emily Howkins</div>
        <div class="id-role">Product designer</div>
        <div class="id-detail">Design systems · Copenhagen</div>
        <a class="enter-btn" href="portfolio/">
            View portfolio <span class="arrow">&rarr;</span>
        </a>
    </div>
    <div class="panel-right">
        <div class="play-carousel-wrap" id="play-carousel-wrap">
            <button class="carousel-arrow arrow-up" id="carousel-up" title="Previous">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 10l4-4 4 4"/></svg>
            </button>
            <div class="play-carousel" id="play-carousel">
                <div class="carousel-track" id="carousel-track">
                    <button class="play-tool" id="tool-draw" data-game="draw">draw</button>
                    <button class="play-tool" id="tool-snake" data-game="snake">snake</button>
                    <button class="play-tool" id="tool-tetris" data-game="tetris">tetris</button>
                    <button class="play-tool" id="tool-pong" data-game="pong">pong</button>
                    <button class="play-tool" id="tool-pacman" data-game="pacman">pacman</button>
                    <button class="play-tool" id="tool-dots" data-game="dots">dots</button>
                    <button class="play-tool" id="tool-mines" data-game="mines">mines</button>
                    <button class="play-tool" id="tool-solitaire" data-game="solitaire">solitaire</button>

                    <button class="play-tool" id="tool-sudoku" data-game="sudoku">sudoku</button>

<script>
'use strict';

var ANALOG_IMGS = [
    'images/analog/img20211113_13274114.jpg',
    'images/analog/img20211113_13274143.jpg',
    'images/analog/img20211113_13274190.jpg',
    'images/analog/img20211113_13274382.jpg',
    'images/analog/ANALOGt41.jpg',
    'images/analog/ANALOGt43.jpg'
];
var trailIdx = 0;

/* ══ CURSOR — dot + ring + physics-based trailing image ribbon ══ */
(function() {
    var dot=document.getElementById('cursor-dot');
    var ring=document.getElementById('cursor-ring');
    var mx=0,my=0,ringX=0,ringY=0;
    var loaderDone=false;

    // Cursor trail: images drop behind cursor, clear then fade
    var TRAIL_N=4, TRAIL_SPACING=80, TRAIL_FADE=1800;
    var distSinceDrop=0, lastTX=0, lastTY=0;

    document.addEventListener('mousemove',function(e){
        mx=e.clientX; my=e.clientY;
        dot.style.left=mx+'px'; dot.style.top=my+'px';

        if(!loaderDone){
            if(document.getElementById('loader').classList.contains('done')||
               document.getElementById('loader').style.display==='none') loaderDone=true;
            else return;
        }
        if(document.body.classList.contains('game-mode')) return;

        var dx=mx-lastTX, dy=my-lastTY;
        distSinceDrop+=Math.sqrt(dx*dx+dy*dy);
        lastTX=mx; lastTY=my;

        if(distSinceDrop>=TRAIL_SPACING){
            distSinceDrop=0;
            dropTrail(mx,my);
        }
    });

    function dropTrail(x,y){
        var existing=document.querySelectorAll('.cursor-trail-img');
        if(existing.length>=TRAIL_N) existing[0].remove();
        var img=document.createElement('img');
        img.className='cursor-trail-img';
        img.src=ANALOG_IMGS[Math.floor(Math.random()*ANALOG_IMGS.length)];
        var rot=(Math.random()-0.5)*8;
        img.style.left=(x+14)+'px';
        img.style.top=(y+14)+'px';
        img.style.transform='rotate('+rot+'deg)';
        img.style.opacity='0';
        document.body.appendChild(img);
        requestAnimationFrame(function(){
            img.style.transition='opacity 0.25s ease';
            img.style.opacity='0.85';
        });
        setTimeout(function(){
            img.style.transition='opacity 1.2s ease';
            img.style.opacity='0';
            setTimeout(function(){ if(img.parentNode) img.remove(); },1300);
        }, TRAIL_FADE);
    }

    // Ring follow
    (function ringFollow(){
        ringX+=(mx-ringX)*0.18; ringY+=(my-ringY)*0.18;
        ring.style.left=ringX+'px'; ring.style.top=ringY+'px';
        requestAnimationFrame(ringFollow);
    }());

    document.addEventListener('mouseover',function(e){
        if(e.target.closest('a,button,.play-tool,.palette-dot,.palette-size,.theme-toggle,.carousel-arrow'))
            document.body.classList.add('cursor-hover');
    });
    document.addEventListener('mouseout',function(e){
        if(e.target.closest('a,button,.play-tool,.palette-dot,.palette-size,.theme-toggle,.carousel-arrow'))
            document.body.classList.remove('cursor-hover');
    });
}());

/* ══ LOADER — stack → cube → hero name center → morph to mid-left → split ══ */
(function(){
    var loader=document.getElementById('loader');
    var heroName=document.getElementById('hero-name');
    var nameInner=heroName.querySelector('.name-inner');
    var pageEl=document.getElementById('page');
    var imgs=document.querySelectorAll('.stack-img');
    var cubeW=document.getElementById('cube-wrap');
    var nameTarget=document.getElementById('name-target');

    if(sessionStorage.getItem('loader-seen')){
        loader.style.display='none';
        heroName.style.display='none';
        nameTarget.style.visibility='visible';
        pageEl.classList.add('visible');
        return;
    }

    // Phase 1: Stack images
    var delay=0;
    imgs.forEach(function(img){
        setTimeout(function(){
            img.classList.add('visible');
            img.style.transform='scale(1) rotate('+(Math.random()*8-4)+'deg)';
        },delay);
        delay+=250;
    });

    // Phase 2: Stack images converge → shrink → cross-fade into cube
    setTimeout(function(){
        // Step 1: Remove rotations, converge and start shrinking
        imgs.forEach(function(img){
            img.style.transition='opacity 0.6s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1)';
            img.style.transform='scale(0.7) rotate(0deg)';
        });
        // Step 2: Continue shrinking while fading, bring cube in underneath
        setTimeout(function(){
            cubeW.style.opacity='0';
            cubeW.style.transition='opacity 0.8s ease';
            cubeW.classList.add('visible');
            // Start cube fade-in slightly before stack fully disappears
            requestAnimationFrame(function(){ cubeW.style.opacity='1'; });
            imgs.forEach(function(img){
                img.style.transition='opacity 0.7s ease, transform 0.7s cubic-bezier(0.16,1,0.3,1)';
                img.style.transform='scale(0.5) rotate(0deg)';
                img.style.opacity='0';
            });
        },500);
    },delay+150);

    // Phase 3: Dismiss loader, show hero name centered
    setTimeout(function(){
        loader.classList.add('done');
        sessionStorage.setItem('loader-seen','1');
        setTimeout(function(){
            loader.style.display='none';
            heroName.classList.add('visible');
        },700);
    },delay+2800);

    // Phase 4: Morph hero name to its final position (mid-left panel)
    setTimeout(function(){
        // Reveal page underneath (but keep hero-name on top during morph)
        pageEl.classList.add('visible');

        // Calculate target position
        var targetRect=nameTarget.getBoundingClientRect();
        var targetFontSize=parseFloat(getComputedStyle(nameTarget).fontSize);
        var currentFontSize=parseFloat(getComputedStyle(nameInner).fontSize);
        var scale=targetFontSize/currentFontSize;

        // Animate hero name to target position
        heroName.style.transition='all 1s cubic-bezier(0.16,1,0.3,1)';
        heroName.style.top=targetRect.top+'px';
        heroName.style.left=targetRect.left+'px';
        heroName.style.transform='translate(0,0) scale('+scale+')';
        heroName.style.transformOrigin='top left';

        // After animation, hide hero and show the real name
        setTimeout(function(){
            heroName.style.display='none';
            nameTarget.style.visibility='visible';
        },1050);
    },delay+4800);
}());

/* ══ DARK MODE ══ */
(function(){
    var btn=document.getElementById('dark-toggle');
    var html=document.documentElement;
    var get=function(){return html.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');};
    function set(t){html.setAttribute('data-theme',t);localStorage.setItem('theme',t);btn.textContent=t==='dark'?'Light mode':'Dark mode';}
    btn.addEventListener('click',function(){set(get()==='dark'?'light':'dark');});
    btn.textContent=get()==='dark'?'Light mode':'Dark mode';
    // Show when page is visible
    if(sessionStorage.getItem('loader-seen')) btn.classList.add('visible');
    new MutationObserver(function(){
        if(document.getElementById('page').classList.contains('visible')) btn.classList.add('visible');
    }).observe(document.getElementById('page'),{attributes:true});
}());

/* ══ CAROUSEL ══ */
(function(){
    var tools=document.querySelectorAll('.play-tool');
    var track=document.getElementById('carousel-track');
    var items=['draw','snake','tetris','pong','pacman','dots','mines','solitaire','invaders','sudoku','crossword'];
    var focusIdx=3; // Start in the middle (pong)

    var upBtn=document.getElementById('carousel-up');
    var downBtn=document.getElementById('carousel-down');

    function updateCarousel(){
        tools.forEach(function(t,i){
            t.classList.remove('active','near');
            if(i===focusIdx) t.classList.add('active');
            else if(Math.abs(i-focusIdx)===1) t.classList.add('near');
        });
        // Arrow disabled states
        upBtn.classList.toggle('disabled',focusIdx===0);
        downBtn.classList.toggle('disabled',focusIdx===items.length-1);
        // Scroll track so active item is centered in the carousel
        requestAnimationFrame(function(){
            var carousel=document.getElementById('play-carousel');
            var carouselH=carousel.offsetHeight;
            var activeEl=tools[focusIdx];
            var trackTop=track.getBoundingClientRect().top;
            var activeTop=activeEl.getBoundingClientRect().top;
            var activeH=activeEl.offsetHeight;
            var offset=activeTop-trackTop;
            var centerOffset=offset-(carouselH/2)+(activeH/2);
            track.style.transform='translateY('+ (-centerOffset) +'px)';
        });
    }

    // Expose functions for carousel ↔ game communication
    window._carouselStopGame = null;
    window._carouselSetFocus = function(idx){ focusIdx=idx; updateCarousel(); };

    document.addEventListener('keydown',function(e){
        var gameMode=document.body.classList.contains('game-mode');
        var isPaused=window._carouselGamePaused&&window._carouselGamePaused();
        var curMode=window._carouselGetMode?window._carouselGetMode():'none';

        // ── Escape: leave game entirely (stop, clear) ──
        if(e.key==='Escape'){
            e.preventDefault();
            if(gameMode || isPaused){
                if(window._carouselFullStop) window._carouselFullStop();
                updateCarousel();
            }
            return;
        }

        // ── Space: toggle in/out of game ──
        if(e.key===' '){
            // While actively playing: pause and go back to nav
            if(gameMode){
                e.preventDefault();
                if(window._carouselStopGame) window._carouselStopGame(); // always pause
                updateCarousel();
                return;
            }
            e.preventDefault();
            // From nav: if paused on same game, resume it
            if(isPaused && items[focusIdx]===curMode){
                if(window._carouselResumeGame) window._carouselResumeGame();
                updateCarousel();
                return;
            }
            // If paused on different game, stop old and start new
            if(isPaused){
                if(window._carouselFullStop) window._carouselFullStop();
            }
            // Start the focused game
            tools[focusIdx].click();
            return;
        }

        // ── Enter: start gameplay (pong/pacman "press enter to start") ──
        if(e.key==='Enter'){
            // Handled by game keydown for pongWaiting/pacmanWaiting
            return;
        }

        // ── Arrow up/down: browse carousel (when not actively playing) ──
        if(!gameMode && e.key==='ArrowUp' && !e.metaKey && !e.ctrlKey){
            e.preventDefault();
            focusIdx=Math.max(0,focusIdx-1);
            updateCarousel();
            return;
        }
        if(!gameMode && e.key==='ArrowDown' && !e.metaKey && !e.ctrlKey){
            e.preventDefault();
            focusIdx=Math.min(items.length-1,focusIdx+1);
            updateCarousel();
            return;
        }

        // ── Tab: cycle through all nav items ──
        if(e.key==='Tab' && !gameMode){
            e.preventDefault();
            if(e.shiftKey) focusIdx=Math.max(0,focusIdx-1);
            else focusIdx=(focusIdx+1)%items.length;
            updateCarousel();
            return;
        }
    });

    // Wheel scroll on carousel
    document.getElementById('play-carousel').addEventListener('wheel',function(e){
        e.preventDefault();
        if(e.deltaY>0) focusIdx=Math.min(items.length-1,focusIdx+1);
        else focusIdx=Math.max(0,focusIdx-1);
        updateCarousel();
    });

    // Click on any carousel item — update focus and optionally start game
    tools.forEach(function(t,i){
        t.addEventListener('click',function(){
            focusIdx=i;
            updateCarousel();
        });
    });

    // Arrow buttons
    document.getElementById('carousel-up').addEventListener('click',function(){
        var gameMode=document.body.classList.contains('game-mode');
        if(gameMode && window._carouselStopGame) window._carouselStopGame();
        focusIdx=Math.max(0,focusIdx-1);
        updateCarousel();
    });
    document.getElementById('carousel-down').addEventListener('click',function(){
        var gameMode=document.body.classList.contains('game-mode');
        if(gameMode && window._carouselStopGame) window._carouselStopGame();
        focusIdx=Math.min(items.length-1,focusIdx+1);
        updateCarousel();
    });

    // Initialize
    setTimeout(updateCarousel,100);
}());

/* ══ GAMES ══ */
(function(){
    var c=document.getElementById('trail');
    var ctx=c.getContext('2d');
    var W,H,DPR=window.devicePixelRatio||1;
    function rsz(){
        W=innerWidth;H=innerHeight;
        c.width=W*DPR;c.height=H*DPR;
        c.style.width=W+'px';c.style.height=H+'px';
        ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    rsz();addEventListener('resize',rsz);
    function dark(){return document.documentElement.getAttribute('data-theme')==='dark';}

    var mode='none';
    var scoreEl=document.getElementById('snake-score');
    var scoreVal=document.getElementById('snake-score-val');
    var paletteEl=document.getElementById('draw-palette');

    var gamePaused=false;
    var pongWaiting=false, pacmanWaiting=false; // "press enter to start" states

    function setMode(nm){
        if(mode===nm&&!gamePaused){pauseGame();return;}
        if(mode===nm&&gamePaused){resumeGame();return;}
        stopAll(); mode=nm; gamePaused=false;
        document.body.classList.add('game-mode');
        if(nm==='draw')paletteEl.classList.add('visible');
        if(nm==='snake')startSnake();
        if(nm==='tetris')startTetris();
        if(nm==='pong'){pongWaiting=true;startPong();}
        if(nm==='pacman'){pacmanWaiting=true;startPacman();}
        if(nm==='dots')startDots();
        if(nm==='mines')startMines();
        if(nm==='solitaire')startSolitaire();
        if(nm==='invaders')startInvaders();
        if(nm==='sudoku')startSudoku();
        if(nm==='crossword')startCrossword();
    }
    function pauseGame(){
        // Pause timers but keep canvas and mode
        if(snakeInt){clearInterval(snakeInt);snakeInt=null;}
        if(tetrisInt){clearInterval(tetrisInt);tetrisInt=null;}
        if(pongInt){cancelAnimationFrame(pongInt);pongInt=null;}
        if(pacmanInt){clearInterval(pacmanInt);pacmanInt=null;}
        if(invadersInt){clearInterval(invadersInt);invadersInt=null;}
        gamePaused=true;
        document.body.classList.remove('game-mode');
        // Keep mode, canvas, score visible
    }
    function resumeGame(){
        gamePaused=false;
        document.body.classList.add('game-mode');
        if(mode==='snake')snakeInt=setInterval(function(){var h={x:snake[0].x+sDir.x,y:snake[0].y+sDir.y};var mX=Math.floor(W/SG),mY=Math.floor(H/SG);if(h.x<0)h.x=mX-1;if(h.x>=mX)h.x=0;if(h.y<0)h.y=mY-1;if(h.y>=mY)h.y=0;for(var j=0;j<snake.length;j++){if(snake[j].x===h.x&&snake[j].y===h.y){setMode('none');return;}}snake.unshift(h);if(sFood&&h.x===sFood.x&&h.y===sFood.y){sSc++;scoreVal.textContent=sSc;sFood={x:Math.floor(Math.random()*mX),y:Math.floor(Math.random()*mY)};}else snake.pop();},100);
        if(mode==='tetris')tetrisInt=setInterval(tt,500);
        if(mode==='pong')pongLoop();
        if(mode==='pacman')pacmanInt=setInterval(pmTick,160);
        if(mode==='invaders')invadersInt=setInterval(ivTick,33);
        if(mode==='draw')paletteEl.classList.add('visible');
    }
    function stopAll(){
        if(snakeInt)clearInterval(snakeInt);snakeInt=null;
        if(tetrisInt)clearInterval(tetrisInt);tetrisInt=null;
        if(pongInt)cancelAnimationFrame(pongInt);pongInt=null;
        if(pacmanInt)clearInterval(pacmanInt);pacmanInt=null;
        if(invadersInt)clearInterval(invadersInt);invadersInt=null;
        solDrag=null;gamePaused=false;pongWaiting=false;pacmanWaiting=false;
        scoreEl.classList.remove('visible');
        paletteEl.classList.remove('visible');
        document.body.classList.remove('game-mode');
        mode='none';
        ctx.clearRect(0,0,W,H);
    }
    function updatePlayingState(){
        var tools=document.querySelectorAll('.play-tool');
        tools.forEach(function(t){t.classList.remove('was-playing');});
        if(gamePaused&&mode!=='none'){
            var el=document.getElementById('tool-'+mode);
            if(el)el.classList.add('was-playing');
        }
    }
    var pauseLbl=document.getElementById('pause-label');
    var origPause=pauseGame,origResume=resumeGame,origStop=stopAll;
    pauseGame=function(){origPause();updatePlayingState();pauseLbl.classList.add('visible');};
    resumeGame=function(){origResume();updatePlayingState();pauseLbl.classList.remove('visible');};
    stopAll=function(){origStop();updatePlayingState();pauseLbl.classList.remove('visible');};
    window._carouselStopGame = pauseGame;
    window._carouselResumeGame = resumeGame;
    window._carouselFullStop = stopAll;
    window._carouselGamePaused = function(){ return gamePaused; };
    window._carouselGetMode = function(){ return mode; };

    /* ── Save artwork — screenshot the full visible page ── */
    document.getElementById('save-artwork').addEventListener('click',function(){
        var toast=document.getElementById('save-toast');
        // Hide cursor + palette + toast for clean capture
        var hideEls=[document.getElementById('cursor-dot'),document.getElementById('cursor-ring'),
                     document.getElementById('draw-palette'),document.getElementById('save-toast')];
        document.querySelectorAll('.cursor-trail-img').forEach(function(e){hideEls.push(e);});
        hideEls.forEach(function(el){if(el)el.style.visibility='hidden';});

        // Compose: background + page text/layout (rendered) + canvas artwork
        var tmp=document.createElement('canvas');
        var dpr=window.devicePixelRatio||1;
        tmp.width=W*dpr;tmp.height=H*dpr;
        var tx=tmp.getContext('2d');
        tx.scale(dpr,dpr);

        // 1. Background
        tx.fillStyle=dark()?'#111111':'#f4f3f1';
        tx.fillRect(0,0,W,H);

        // 2. Render page text (name, role, detail)
        var nameEl=document.getElementById('name-target');
        var roleEl=document.querySelector('.id-role');
        var detailEl=document.querySelector('.id-detail');
        tx.fillStyle=dark()?'#e8e8e8':'#1a1a1a';
        if(nameEl){
            var ns=getComputedStyle(nameEl);
            tx.font=ns.fontWeight+' '+ns.fontSize+' Inter, sans-serif';
            var nr=nameEl.getBoundingClientRect();
            tx.fillText(nameEl.textContent,nr.left,nr.top+parseInt(ns.fontSize)*0.85);
        }
        if(roleEl){
            var rs=getComputedStyle(roleEl);
            tx.font=rs.fontWeight+' '+rs.fontSize+' Inter, sans-serif';
            tx.fillStyle=dark()?'#888':'#777';
            var rr=roleEl.getBoundingClientRect();
            tx.fillText(roleEl.textContent,rr.left,rr.top+parseInt(rs.fontSize)*0.85);
        }
        if(detailEl){
            var ds=getComputedStyle(detailEl);
            tx.font=ds.fontWeight+' '+ds.fontSize+' Inter, sans-serif';
            var dr=detailEl.getBoundingClientRect();
            tx.fillText(detailEl.textContent,dr.left,dr.top+parseInt(ds.fontSize)*0.85);
        }

        // 3. The drawing/game canvas on top
        tx.drawImage(c,0,0,W,H);

        // Restore hidden elements
        hideEls.forEach(function(el){if(el)el.style.visibility='';});

        // Download
        var link=document.createElement('a');
        link.download='artwork-'+Date.now()+'.png';
        link.href=tmp.toDataURL('image/png');
        link.click();
        toast.classList.add('visible');
        setTimeout(function(){toast.classList.remove('visible');},2000);
    });

    /* ── Draw ── */
    var drawCol='#1a1a1a',drawSz=3,isDraw=false,ldx=0,ldy=0,drawEraser=false;
    document.querySelectorAll('.palette-dot').forEach(function(d){
        d.addEventListener('click',function(){
            document.querySelectorAll('.palette-dot').forEach(function(x){x.classList.remove('active');});
            d.classList.add('active');drawCol=d.getAttribute('data-color');drawEraser=false;
            document.getElementById('draw-eraser').classList.remove('active');
        });
    });
    document.querySelectorAll('.palette-size').forEach(function(b){
        if(b.id==='draw-eraser'||b.id==='draw-clear')return;
        b.addEventListener('click',function(){
            document.querySelectorAll('.palette-size:not(#draw-eraser):not(#draw-clear)').forEach(function(x){x.classList.remove('active');});
            b.classList.add('active');drawSz=parseInt(b.getAttribute('data-size'));
        });
    });
    // Eraser
    document.getElementById('draw-eraser').addEventListener('click',function(){
        drawEraser=!drawEraser;
        this.classList.toggle('active',drawEraser);
    });
    // Clear canvas
    document.getElementById('draw-clear').addEventListener('click',function(){
        ctx.clearRect(0,0,W,H);
    });
    addEventListener('mousedown',function(e){
        if(mode!=='draw')return;
        if(e.target.closest('#draw-palette,.play-carousel-wrap,.theme-toggle,#save-toast')||e.target.tagName==='A')return;
        isDraw=true;ldx=e.clientX;ldy=e.clientY;
        if(drawEraser){
            ctx.globalCompositeOperation='destination-out';
            ctx.globalAlpha=1;ctx.beginPath();ctx.arc(e.clientX,e.clientY,drawSz*1.5,0,Math.PI*2);ctx.fill();
        } else {
            ctx.globalCompositeOperation='source-over';
            ctx.globalAlpha=0.9;ctx.fillStyle=drawCol;
            ctx.beginPath();ctx.arc(e.clientX,e.clientY,drawSz/2,0,Math.PI*2);ctx.fill();
        }
    });
    addEventListener('mousemove',function(e){
        if(mode!=='draw'||!isDraw)return;
        if(drawEraser){
            ctx.globalCompositeOperation='destination-out';
            ctx.lineWidth=drawSz*3;ctx.globalAlpha=1;

    /* ── Pac-Man (classic style) ── */

    function pmGenClassicMap(){
        // Generate a classic Pac-Man style map: open corridors with wall blocks
        // Uses half-width then mirrors for symmetry
        var halfC=Math.floor(pmCols/2)+1;
        pmGrid=Array.from({length:pmRows},function(){return Array(pmCols).fill(0);});
        // Border walls
        for(var x=0;x<pmCols;x++){pmGrid[0][x]=1;pmGrid[pmRows-1][x]=1;}
        for(var y=0;y<pmRows;y++){pmGrid[y][0]=1;pmGrid[y][pmCols-1]=1;}
        // Place random wall blocks on left half, mirror to right
        var blockCount=Math.floor(pmCols*pmRows*0.08);
        for(var b=0;b<blockCount;b++){
            var bw=1+Math.floor(Math.random()*3);
            var bh=1+Math.floor(Math.random()*3);
            var bx=2+Math.floor(Math.random()*(halfC-bw-2));
            var by=2+Math.floor(Math.random()*(pmRows-bh-4));
            // Don't block spawn area (center)
            var midY=Math.floor(pmRows/2),midX=Math.floor(pmCols/2);
            if(Math.abs(by-midY)<3&&bx<4)continue;
            for(var dy=0;dy<bh;dy++)for(var dx=0;dx<bw;dx++){
                pmGrid[by+dy][bx+dx]=1;
                pmGrid[by+dy][pmCols-1-bx-dx]=1; // mirror
            }
        }
        // Clear player spawn (bottom-center) and ghost pen (center)
        var cx=Math.floor(pmCols/2),cy=Math.floor(pmRows/2);
        for(var dy2=-1;dy2<=1;dy2++)for(var dx2=-2;dx2<=2;dx2++){
            if(cy+dy2>0&&cy+dy2<pmRows-1&&cx+dx2>0&&cx+dx2<pmCols-1)pmGrid[cy+dy2][cx+dx2]=0;
        }
        // Clear player start
        pmGrid[pmRows-2][cx]=0;pmGrid[pmRows-3][cx]=0;
        pmGrid[pmRows-2][cx-1]=0;pmGrid[pmRows-2][cx+1]=0;
        // Ensure corridors: clear horizontal lanes
        var lanes=[3,Math.floor(pmRows/2),pmRows-4];
        for(var li=0;li<lanes.length;li++){var ly=lanes[li];if(ly>0&&ly<pmRows-1)for(var lx=1;lx<pmCols-1;lx++)pmGrid[ly][lx]=0;}
        // Ensure vertical corridors
        var vcols=[3,Math.floor(pmCols/2),pmCols-4];
        for(var vi=0;vi<vcols.length;vi++){var vx=vcols[vi];if(vx>0&&vx<pmCols-1)for(var vy=1;vy<pmRows-1;vy++)pmGrid[vy][vx]=0;}
    }
    function startPacman(){

        // Place dots on open cells
        pmDots2=[];
        var cx=Math.floor(pmCols/2),cy=Math.floor(pmRows/2);
        for(var py=0;py<pmRows;py++)for(var px=0;px<pmCols;px++){
            if(pmGrid[py][px]===0){
                // Skip ghost pen area
                if(Math.abs(px-cx)<=2&&Math.abs(py-cy)<=1)continue;
                pmDots2.push({x:px,y:py,eaten:false});

        }

        pmScore2=0;pmMouth=0;

        pmGhosts=[
            {x:cx-1,y:cy,dx:1,dy:0,col:'#ff4040'},

    function pmDrawWaiting(){

            if(pmGrid[py2][px2]===1){ctx.fillStyle=dark()?'#223':'#cce';ctx.globalAlpha=0.3;ctx.fillRect(ox+px2*pmSz,oy+py2*pmSz,pmSz,pmSz);ctx.globalAlpha=1;}

    function pmCanMove(gx,gy){return gx>=0&&gx<pmCols&&gy>=0&&gy<pmRows&&pmGrid[gy][gx]===0;}
    function pmTick(){
        if(mode!=='pacman')return;
        pmMouth=(pmMouth+1)%6;
        if(pmCanMove(pmPlayer.x+pmNextDir.x,pmPlayer.y+pmNextDir.y))pmDir=pmNextDir;
        var nx=pmPlayer.x+pmDir.x,ny=pmPlayer.y+pmDir.y;
        // Tunnel wrap

            }

        for(var di=0;di<pmDots2.length;di++){if(!pmDots2[di].eaten){allEaten=false;break;}}
        if(allEaten){setMode('none');return;}
        // Move ghosts — semi-intelligent: bias toward player direction
        for(var g=0;g<pmGhosts.length;g++){
            var gh=pmGhosts[g];
            var opts=[[0,-1],[0,1],[-1,0],[1,0]].filter(function(d){

            if(opts.length){

                        var da=Math.abs(gh.x+a[0]-pmPlayer.x)+Math.abs(gh.y+a[1]-pmPlayer.y);

                        return da-db;
                    });

                    opts.sort(function(){return Math.random()-0.5;});
                }

            }
            var gnx=gh.x+gh.dx,gny=gh.y+gh.dy;
            if(gnx<0)gnx=pmCols-1;if(gnx>=pmCols)gnx=0;

        }

    /* ── Minesweeper ── */
    var mCols=12,mRows=10,mMines=15,mBoard=null,mRevealed=null,mFlags=null,mGameOver=false,mWon=false;
    var mCellSz=32;
    function startMines(){
        mCellSz=Math.min(32,Math.floor(Math.min(W*0.5/mCols,H*0.6/mRows)));
        mBoard=Array.from({length:mRows},function(){return Array(mCols).fill(0);});
        mRevealed=Array.from({length:mRows},function(){return Array(mCols).fill(false);});
        mFlags=Array.from({length:mRows},function(){return Array(mCols).fill(false);});
        mGameOver=false;mWon=false;
        // Place mines
        var placed=0;
        while(placed<mMines){var rx=Math.floor(Math.random()*mCols),ry=Math.floor(Math.random()*mRows);
            if(mBoard[ry][rx]!==-1){mBoard[ry][rx]=-1;placed++;}
        }
        // Count neighbors
        for(var y=0;y<mRows;y++)for(var x=0;x<mCols;x++){
            if(mBoard[y][x]===-1)continue;var cnt=0;
            for(var dy=-1;dy<=1;dy++)for(var dx=-1;dx<=1;dx++){
                var nx2=x+dx,ny2=y+dy;
                if(nx2>=0&&nx2<mCols&&ny2>=0&&ny2<mRows&&mBoard[ny2][nx2]===-1)cnt++;
            }

        }

    function mReveal(x,y){

            }

        for(var bi=ivBullets.length-1;bi>=0;bi--){
            for(var ai=0;ai<ivAliens.length;ai++){
                if(!ivAliens[ai].alive)continue;
                var al=ivAliens[ai];

    function startCrossword(){
        // Pick daily puzzle based on day-of-year (cycles through 30 puzzles)
        var now=new Date();
        var start=new Date(now.getFullYear(),0,0);
        var dayOfYear=Math.floor((now-start)/86400000)+cwSeedOffset;
        var pIdx=((dayOfYear%CW_PUZZLES.length)+CW_PUZZLES.length)%CW_PUZZLES.length;
        var puzzle=CW_PUZZLES[pIdx];

        cwCellSz=Math.min(42,Math.floor(Math.min(W*0.38/cwCols,H*0.58/cwRows)));
        cwUserLetters=Array.from({length:cwRows},function(){return Array(cwCols).fill('');});

        // Parse solution string into grid
        cwGrid=[];
        for(var r=0;r<cwRows;r++){
            cwGrid[r]=[];
            for(var c=0;c<cwCols;c++){
                cwGrid[r][c]=puzzle.s[r*cwCols+c];
            }
        }

        // Build clues from puzzle data
        cwClues={across:[],down:[]};
        for(var ai=0;ai<puzzle.a.length;ai++){
            var ac=puzzle.a[ai];
            cwClues.across.push({num:ac.n,clue:ac.c,word:ac.w,len:ac.w.length});
        }
        for(var di=0;di<puzzle.d.length;di++){
            var dc=puzzle.d[di];
            cwClues.down.push({num:dc.n,clue:dc.c,word:dc.w,len:dc.w.length});
        }

        // Number cells (standard crossword numbering)
        var cwNums=Array.from({length:cwRows},function(){return Array(cwCols).fill(0);});
        var num=1;
        for(var r=0;r<cwRows;r++)for(var c=0;c<cwCols;c++){
            if(cwGrid[r][c]==='#')continue;
            var isAcrossStart=(c===0||cwGrid[r][c-1]==='#')&&(c+1<cwCols&&cwGrid[r][c+1]!=='#');
            var isDownStart=(r===0||cwGrid[r-1][c]==='#')&&(r+1<cwRows&&cwGrid[r+1][c]!=='#');
            if(isAcrossStart||isDownStart){cwNums[r][c]=num;num++;}
        }
        cwSelected=null;cwDir='across';
        cwGrid._nums=cwNums;
    }

    function renderDotGuide(){
        if(!dotPoints.length)return;
        var fg=dark()?'#e8e8e8':'#1a1a1a';
        // Draw visible shape outline as guide
        ctx.globalAlpha=0.12;ctx.strokeStyle=fg;ctx.lineWidth=2;ctx.setLineDash([6,6]);
        ctx.beginPath();ctx.moveTo(dotPoints[0].x,dotPoints[0].y);
        for(var i=1;i<dotPoints.length;i++)ctx.lineTo(dotPoints[i].x,dotPoints[i].y);
        ctx.closePath();ctx.stroke();ctx.setLineDash([]);
        // Big numbered dots — easier to see and follow
        var step=Math.max(1,Math.floor(dotPoints.length/10));
        var n=1;
        for(var j=0;j<dotPoints.length;j+=step){
            var dIdx=n-1;
            var reached=dotReached[dIdx];
            var isNext=dIdx===dotNextIdx;
            if(reached){
                // Reached dot — green, solid
                ctx.fillStyle='#22cc66';ctx.globalAlpha=0.6;
                ctx.beginPath();ctx.arc(dotPoints[j].x,dotPoints[j].y,10,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#fff';ctx.globalAlpha=0.9;ctx.font='600 10px Inter,sans-serif';ctx.textAlign='center';
                ctx.fillText(n,dotPoints[j].x,dotPoints[j].y+3.5);
            } else {
                // Unreached — pulse the next one
                var r2=isNext?14:12;
                ctx.fillStyle=isNext?'#ffaa00':'#ff4040';ctx.globalAlpha=isNext?0.4:0.25;
                ctx.beginPath();ctx.arc(dotPoints[j].x,dotPoints[j].y,r2,0,Math.PI*2);ctx.fill();
                ctx.globalAlpha=0.7;
                ctx.beginPath();ctx.arc(dotPoints[j].x,dotPoints[j].y,6,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#fff';ctx.globalAlpha=0.9;ctx.font='600 10px Inter,sans-serif';ctx.textAlign='center';
                ctx.fillText(n,dotPoints[j].x,dotPoints[j].y+3.5);
            }
            n++;
        }
        // Highlight start point (dot 1) with a pulsing ring
        if(dotPoints.length>0){
            ctx.save();ctx.strokeStyle='#ff4040';ctx.lineWidth=2;ctx.globalAlpha=0.6;ctx.setLineDash([4,4]);
            ctx.beginPath();ctx.arc(dotPoints[0].x,dotPoints[0].y,22,0,Math.PI*2);ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle='#ff4040';ctx.globalAlpha=0.8;ctx.font='500 10px Inter, sans-serif';ctx.textAlign='center';
            ctx.fillText('START',dotPoints[0].x,dotPoints[0].y+34);
            ctx.restore();
        }
        // Prompt text
        ctx.fillStyle=fg;ctx.globalAlpha=0.5;ctx.font='500 18px Inter, sans-serif';ctx.textAlign='center';
        ctx.fillText('Connect the dots — trace the shape!',W/2,H/2-Math.min(W,H)*0.35);
        ctx.font='400 13px Inter, sans-serif';ctx.globalAlpha=0.35;
        ctx.fillText('Click and drag to draw, then press R to reveal',W/2,H/2-Math.min(W,H)*0.35+24);
        ctx.globalAlpha=1;
    }

        var clearModes=['snake','tetris','pacman','mines','solitaire','invaders','sudoku','crossword'];
        if(clearModes.indexOf(mode)!==-1)ctx.clearRect(0,0,W,H);
        var fg=dark()?'#e8e8e8':'#1a1a1a';
        var MCOLS2=['#ff4040','#3388ff','#22cc66','#ffaa00','#cc44ff'];

        if(mode==='snake'){

            ctx.globalAlpha=1;if(sFood){ctx.fillStyle=fCol;ctx.fillRect(sFood.x*SG+1,sFood.y*SG+1,SG-2,SG-2);}
        }

        if(mode==='tetris'){
            var ox=Math.floor((W-TC*TS)/2),oy=Math.floor((H-TR*TS)/2);
            ctx.strokeStyle=dark()?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)';ctx.lineWidth=1.5;ctx.strokeRect(ox-1,oy-1,TC*TS+2,TR*TS+2);

        if(mode==='pacman'&&pmGrid){

                for(var w=0;w<3;w++){var wx=gx2+pmSz/2-2-w*(pmSz-4)/3;ctx.lineTo(wx-(pmSz-4)/6,gy2+pmSz/2-6);ctx.lineTo(wx-(pmSz-4)/3,gy2+pmSz/2-2);}
                ctx.fill();

                ctx.fillStyle='#fff';ctx.globalAlpha=1;

                ctx.fillStyle='#111';

        if(mode==='mines'&&mBoard){
            var mox2=Math.floor((W-mCols*mCellSz)/2),moy2=Math.floor((H-mRows*mCellSz)/2);

            for(var my2=0;my2<mRows;my2++)for(var mx3=0;mx3<mCols;mx3++){

                    if(mBoard[my2][mx3]===-1){ctx.fillStyle='#ff4040';ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(cx2+mCellSz/2,cy2+mCellSz/2,mCellSz/4,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}

        if(mode==='solitaire'){
            var ox=solOx(),oy=solOy();

                ctx.fillStyle=isDark?'#1a1a1a':'#fff';ctx.globalAlpha=0.95;
                ctx.beginPath();
                ctx.moveTo(x+3,y);ctx.lineTo(x+solCW-3,y);ctx.quadraticCurveTo(x+solCW,y,x+solCW,y+3);
                ctx.lineTo(x+solCW,y+solCH-3);ctx.quadraticCurveTo(x+solCW,y+solCH,x+solCW-3,y+solCH);

            else{ctx.strokeStyle=isDk?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.strokeRect(ox,oy,solCW,solCH);}

        if(mode==='sudoku'&&suBoard){
            var sox=Math.floor((W-9*suCellSz)/2),soy=Math.floor((H-9*suCellSz)/2);

                else if(suSelected&&(suSelected.r===sr||suSelected.c===sc)){ctx.fillStyle=isDk3?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.03)';ctx.fillRect(scx,scy,suCellSz,suCellSz);}
                // Grid lines
                ctx.strokeStyle=isDk3?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)';ctx.lineWidth=0.5;ctx.strokeRect(scx,scy,suCellSz,suCellSz);

                }
            }

            ctx.strokeStyle=isDk3?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.2)';ctx.lineWidth=2;
            for(var bx2=0;bx2<=3;bx2++){ctx.beginPath();ctx.moveTo(sox+bx2*3*suCellSz,soy);ctx.lineTo(sox+bx2*3*suCellSz,soy+9*suCellSz);ctx.stroke();}

        if(mode==='crossword'&&cwGrid){

            for(var cr=0;cr<cwRows;cr++)for(var cc=0;cc<cwCols;cc++){

                ctx.fillStyle=isDk4?'#222':'#fff';ctx.globalAlpha=0.95;
                ctx.fillRect(ccx,ccy,cwCellSz,cwCellSz);

                if(cwSelected){
                    var inWord=false;
                    if(cwDir==='across'&&cr===cwSelected.r){
                        // Check if this cell is in the same word
                        var ws=cwSelected.c;while(ws>0&&cwGrid[cr][ws-1]!=='#')ws--;
                        var we=cwSelected.c;while(we<cwCols-1&&cwGrid[cr][we+1]!=='#')we++;
                        if(cc>=ws&&cc<=we)inWord=true;

                    if(cwDir==='down'&&cc===cwSelected.c){
                        var wsr=cwSelected.r;while(wsr>0&&cwGrid[wsr-1][cc]!=='#')wsr--;
                        var wer=cwSelected.r;while(wer<cwRows-1&&cwGrid[wer+1][cc]!=='#')wer++;
                        if(cr>=wsr&&cr<=wer)inWord=true;
                    }
                    if(inWord){ctx.fillStyle='rgba(60,120,255,0.12)';ctx.fillRect(ccx,ccy,cwCellSz,cwCellSz);}
                    if(cwSelected.r===cr&&cwSelected.c===cc){
                        ctx.fillStyle='rgba(60,120,255,0.3)';ctx.fillRect(ccx,ccy,cwCellSz,cwCellSz);
                    }
                }
                // Cell border
                ctx.strokeStyle=isDk4?'rgba(255,255,255,0.2)':'rgba(0,0,0,0.25)';ctx.lineWidth=1;ctx.strokeRect(ccx,ccy,cwCellSz,cwCellSz);
                // Cell number (top-left)
                if(nums[cr]&&nums[cr][cc]){

                    ctx.font='600 '+(cwCellSz*0.55)+'px Inter, sans-serif';ctx.textAlign='center';
                    ctx.fillText(cwUserLetters[cr][cc],ccx+cwCellSz/2,ccy+cwCellSz*0.72);ctx.globalAlpha=1;

            ctx.strokeStyle=isDk4?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.4)';ctx.lineWidth=2;

            ctx.globalAlpha=0.65;ctx.font='400 10px Inter, sans-serif';
            var maxDown=Math.min(cwClues.down.length,10);
            for(var cd=0;cd<maxDown;cd++){
                ctx.fillText(cwClues.down[cd].num+'. '+cwClues.down[cd].clue,clueX,downY+lineH+cd*lineH);
            }
            // Instruction text removed
            ctx.globalAlpha=1;

            ctx.fillText('New',nbX+nbW/2,nbY+nbH/2);ctx.globalAlpha=1;ctx.textBaseline='alphabetic';

        }

        // Pause icon for realtime games
        if(gamePaused&&mode!=='none'){

        requestAnimationFrame(gameRender);
    }());

    /* ── Keys ── */
    document.addEventListener('keydown',function(e){
        // Enter dismisses "press enter to start" for pong/pacman
        if(e.key==='Enter'){
            if(mode==='pong'&&pongWaiting){e.preventDefault();pongWaiting=false;pongLoop();return;}
            if(mode==='pacman'&&pacmanWaiting){e.preventDefault();pacmanWaiting=false;pacmanInt=setInterval(pmTick,160);return;}
        }
        if(mode==='snake'){if(e.key==='ArrowUp'&&sDir.y!==1){sDir={x:0,y:-1};e.preventDefault();}if(e.key==='ArrowDown'&&sDir.y!==-1){sDir={x:0,y:1};e.preventDefault();}if(e.key==='ArrowLeft'&&sDir.x!==1){sDir={x:-1,y:0};e.preventDefault();}if(e.key==='ArrowRight'&&sDir.x!==-1){sDir={x:1,y:0};e.preventDefault();}}
        if(mode==='tetris'){if(e.key==='ArrowLeft'&&!cl(tX-1,tY,tP)){tX--;e.preventDefault();}if(e.key==='ArrowRight'&&!cl(tX+1,tY,tP)){tX++;e.preventDefault();}if(e.key==='ArrowDown'){if(!cl(tX,tY+1,tP))tY++;e.preventDefault();}if(e.key==='ArrowUp'){rp();e.preventDefault();}}
        if(mode==='pacman'){
            if(e.key==='ArrowUp'){pmNextDir={x:0,y:-1};e.preventDefault();}
            if(e.key==='ArrowDown'){pmNextDir={x:0,y:1};e.preventDefault();}
            if(e.key==='ArrowLeft'){pmNextDir={x:-1,y:0};e.preventDefault();}
            if(e.key==='ArrowRight'){pmNextDir={x:1,y:0};e.preventDefault();}
        }
        if(mode==='dots'&&(e.key==='r'||e.key==='R')){
            e.preventDefault();dotRevealed=true;
            var fg2=dark()?'#e8e8e8':'#1a1a1a';
            ctx.fillStyle=fg2;ctx.globalAlpha=0.6;ctx.font='600 28px Inter, sans-serif';ctx.textAlign='center';
            ctx.fillText('It was a '+dotShape.name+'!',W/2,H/2+Math.min(W,H)*0.28);ctx.globalAlpha=1;
        }
        if(mode==='invaders'){
            if(e.key==='ArrowLeft'){ivPlayer.x=Math.max(ivPW/2,ivPlayer.x-12);e.preventDefault();}
            if(e.key==='ArrowRight'){ivPlayer.x=Math.min(W-ivPW/2,ivPlayer.x+12);e.preventDefault();}
            if(e.key==='ArrowUp'){e.preventDefault();if(ivBullets.length<3)ivBullets.push({x:ivPlayer.x,y:H*0.75-ivPH});}
        }
        if(mode==='sudoku'&&suBoard&&suSelected){
            if(e.key>='1'&&e.key<='9'&&!suGiven[suSelected.r][suSelected.c]){
                suBoard[suSelected.r][suSelected.c]=parseInt(e.key);e.preventDefault();
            }
            if(e.key==='Backspace'||e.key==='Delete'){if(!suGiven[suSelected.r][suSelected.c])suBoard[suSelected.r][suSelected.c]=0;e.preventDefault();}
            if(e.key==='ArrowUp'&&suSelected.r>0){suSelected.r--;e.preventDefault();}
            if(e.key==='ArrowDown'&&suSelected.r<8){suSelected.r++;e.preventDefault();}
            if(e.key==='ArrowLeft'&&suSelected.c>0){suSelected.c--;e.preventDefault();}
            if(e.key==='ArrowRight'&&suSelected.c<8){suSelected.c++;e.preventDefault();}
        }
        if(mode==='crossword'&&cwGrid){
            if(e.key==='n'||e.key==='N'){cwSeedOffset++;startCrossword();e.preventDefault();return;}
        }
        if(mode==='crossword'&&cwGrid&&cwSelected){
            // NYT-style crossword navigation
            function cwAdvance(){
                if(cwDir==='across'){
                    for(var nc=cwSelected.c+1;nc<cwCols;nc++){if(cwGrid[cwSelected.r][nc]!=='#'){cwSelected.c=nc;return;}}
                } else {
                    for(var nr=cwSelected.r+1;nr<cwRows;nr++){if(cwGrid[nr][cwSelected.c]!=='#'){cwSelected.r=nr;return;}}
                }
            }
            function cwRetreat(){
                if(cwDir==='across'){
                    for(var nc=cwSelected.c-1;nc>=0;nc--){if(cwGrid[cwSelected.r][nc]!=='#'){cwSelected.c=nc;return;}}
                } else {
                    for(var nr=cwSelected.r-1;nr>=0;nr--){if(cwGrid[nr][cwSelected.c]!=='#'){cwSelected.r=nr;return;}}
                }
            }
            if(e.key.length===1&&/[a-zA-Z]/.test(e.key)){
                cwUserLetters[cwSelected.r][cwSelected.c]=e.key.toUpperCase();
                cwAdvance();e.preventDefault();
            }
            if(e.key==='Backspace'){
                if(cwUserLetters[cwSelected.r][cwSelected.c]){cwUserLetters[cwSelected.r][cwSelected.c]='';}
                else{cwRetreat();cwUserLetters[cwSelected.r][cwSelected.c]='';}
                e.preventDefault();
            }
            if(e.key==='Delete'){cwUserLetters[cwSelected.r][cwSelected.c]='';e.preventDefault();}
            if(e.key==='ArrowUp'){
                e.preventDefault();
                if(cwDir!=='down'){cwDir='down';return;}
                for(var nu=cwSelected.r-1;nu>=0;nu--){if(cwGrid[nu][cwSelected.c]!=='#'){cwSelected.r=nu;break;}}
            }
            if(e.key==='ArrowDown'){
                e.preventDefault();
                if(cwDir!=='down'){cwDir='down';return;}
                for(var nd=cwSelected.r+1;nd<cwRows;nd++){if(cwGrid[nd][cwSelected.c]!=='#'){cwSelected.r=nd;break;}}
            }
            if(e.key==='ArrowLeft'){
                e.preventDefault();
                if(cwDir!=='across'){cwDir='across';return;}
                for(var nl=cwSelected.c-1;nl>=0;nl--){if(cwGrid[cwSelected.r][nl]!=='#'){cwSelected.c=nl;break;}}
            }
            if(e.key==='ArrowRight'){
                e.preventDefault();
                if(cwDir!=='across'){cwDir='across';return;}
                for(var nri=cwSelected.c+1;nri<cwCols;nri++){if(cwGrid[cwSelected.r][nri]!=='#'){cwSelected.c=nri;break;}}
            }
            if(e.key==='Tab'){
                e.preventDefault();
                // Jump to first cell of next word
                var cwNums=cwGrid._nums||[];
                var clueList=cwDir==='across'?cwClues.across:cwClues.down;
                if(clueList.length===0)return;
                // Find current word number
                var curNum=0;
                if(cwDir==='across'){
                    var ws=cwSelected.c;while(ws>0&&cwGrid[cwSelected.r][ws-1]!=='#')ws--;
                    curNum=cwNums[cwSelected.r][ws]||0;
                } else {
                    var wsr=cwSelected.r;while(wsr>0&&cwGrid[wsr-1][cwSelected.c]!=='#')wsr--;
                    curNum=cwNums[wsr][cwSelected.c]||0;
                }
                // Find next clue after current
                var nextClue=null;
                for(var ci=0;ci<clueList.length;ci++){
                    if(clueList[ci].num>curNum){nextClue=clueList[ci];break;}
                }
                if(!nextClue)nextClue=clueList[0]; // wrap around
                // Find cell with that number
                for(var tr=0;tr<cwRows;tr++)for(var tc=0;tc<cwCols;tc++){
                    if(cwNums[tr][tc]===nextClue.num){cwSelected={r:tr,c:tc};return;}
                }
            }
        }
    });

    /* Pong mouse */
    addEventListener('mousemove',function(e){
        if(mode==='pong')pR.y=Math.max(pCourt.y,Math.min(pCourt.y+pCourt.h-paddleH,e.clientY-paddleH/2));
    });

    /* Dots drawing */
    addEventListener('mousedown',function(e){
        if(mode!=='dots'||dotRevealed)return;
        dotDrawing=true;dotLdx=e.clientX;dotLdy=e.clientY;
    });
    addEventListener('mousemove',function(e){
        if(mode!=='dots'||!dotDrawing)return;
        ctx.strokeStyle='#3388ff';ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=0.8;
        ctx.beginPath();ctx.moveTo(dotLdx,dotLdy);ctx.lineTo(e.clientX,e.clientY);ctx.stroke();
        dotLdx=e.clientX;dotLdy=e.clientY;ctx.globalAlpha=1;
        // Tactile: check if cursor reached next dot
        if(dotNextIdx<dotReached.length&&dotPoints.length){
            var step3=Math.max(1,Math.floor(dotPoints.length/10));
            var pi=dotNextIdx*step3;
            if(pi<dotPoints.length){
                var dx2=e.clientX-dotPoints[pi].x,dy2=e.clientY-dotPoints[pi].y;
                var dist2=Math.sqrt(dx2*dx2+dy2*dy2);
                // Proximity glow — draw pull indicator when getting close
                if(dist2<60&&!dotReached[dotNextIdx]){
                    ctx.save();ctx.globalAlpha=Math.max(0.1,0.5-dist2/120);
                    ctx.strokeStyle='#22cc66';ctx.lineWidth=2;ctx.setLineDash([3,3]);
                    ctx.beginPath();ctx.moveTo(e.clientX,e.clientY);ctx.lineTo(dotPoints[pi].x,dotPoints[pi].y);ctx.stroke();
                    ctx.setLineDash([]);ctx.restore();
                }
                if(dist2<18){
                    dotReached[dotNextIdx]=true;dotPulse=12;
                    // Flash the reached dot
                    ctx.save();ctx.globalAlpha=0.9;ctx.fillStyle='#22cc66';
                    ctx.beginPath();ctx.arc(dotPoints[pi].x,dotPoints[pi].y,16,0,Math.PI*2);ctx.fill();
                    ctx.fillStyle='#fff';ctx.font='600 11px Inter,sans-serif';ctx.textAlign='center';
                    ctx.fillText(dotNextIdx+1,dotPoints[pi].x,dotPoints[pi].y+4);
                    ctx.restore();
                    dotNextIdx++;
                }
            }
        }
    });
    addEventListener('mouseup',function(){dotDrawing=false;});

    /* Mines click */
    addEventListener('click',function(e){
        if(mode!=='mines'||mGameOver||!mBoard)return;
        var mox2=Math.floor((W-mCols*mCellSz)/2),moy2=Math.floor((H-mRows*mCellSz)/2);
        var mx4=Math.floor((e.clientX-mox2)/mCellSz),my4=Math.floor((e.clientY-moy2)/mCellSz);
        if(mx4<0||mx4>=mCols||my4<0||my4>=mRows)return;
        if(mFlags[my4][mx4])return;
        if(mBoard[my4][mx4]===-1){
            // Reveal all mines
            for(var y=0;y<mRows;y++)for(var x=0;x<mCols;x++){if(mBoard[y][x]===-1)mRevealed[y][x]=true;}
            mGameOver=true;
        } else {
            mReveal(mx4,my4);
            if(mCheckWin()){mWon=true;mGameOver=true;}
        }
    });
    /* Mines right-click for flag */
    addEventListener('contextmenu',function(e){
        if(mode!=='mines'||mGameOver||!mBoard)return;
        e.preventDefault();
        var mox2=Math.floor((W-mCols*mCellSz)/2),moy2=Math.floor((H-mRows*mCellSz)/2);
        var mx4=Math.floor((e.clientX-mox2)/mCellSz),my4=Math.floor((e.clientY-moy2)/mCellSz);
        if(mx4<0||mx4>=mCols||my4<0||my4>=mRows)return;
        if(!mRevealed[my4][mx4])mFlags[my4][mx4]=!mFlags[my4][mx4];
    });

    /* Sudoku click */
    addEventListener('click',function(e){
        if(mode!=='sudoku'||!suBoard)return;
        var sox=Math.floor((W-9*suCellSz)/2),soy=Math.floor((H-9*suCellSz)/2);
        var sc=Math.floor((e.clientX-sox)/suCellSz),sr=Math.floor((e.clientY-soy)/suCellSz);
        if(sc>=0&&sc<9&&sr>=0&&sr<9)suSelected={r:sr,c:sc};
    });
    /* Crossword click — toggle direction on re-click like NYT */
    addEventListener('click',function(e){
        if(mode!=='crossword'||!cwGrid)return;
        // Check "New" button click
        if(cwGrid._newBtn){
            var nb=cwGrid._newBtn;
            if(e.clientX>=nb.x&&e.clientX<=nb.x+nb.w&&e.clientY>=nb.y&&e.clientY<=nb.y+nb.h){
                cwSeedOffset++;startCrossword();return;
            }
        }
        var cox=Math.floor((W-cwCols*cwCellSz)/2)-70,coy=Math.floor((H-cwRows*cwCellSz)/2);
        var cc2=Math.floor((e.clientX-cox)/cwCellSz),cr2=Math.floor((e.clientY-coy)/cwCellSz);
        if(cc2>=0&&cc2<cwCols&&cr2>=0&&cr2<cwRows&&cwGrid[cr2][cc2]!=='#'){
            if(cwSelected&&cwSelected.r===cr2&&cwSelected.c===cc2)cwDir=cwDir==='across'?'down':'across';
            else cwSelected={r:cr2,c:cc2};
        }
    });

    /* Solitaire mouse */
    var solMouseOx=0,solMouseOy=0;
    addEventListener('mousedown',function(e){
        if(mode!=='solitaire')return;
        var hit=solCardAt(e.clientX,e.clientY);
        if(!hit)return;
        if(hit.zone==='stock'){
            // Deal from stock to waste
            if(solStock.length){var c=solStock.pop();c.faceUp=true;solWaste.push(c);}
            else{while(solWaste.length){var c2=solWaste.pop();c2.faceUp=false;solStock.push(c2);}}
            return;
        }
        if(hit.zone==='waste'){
            solDragCards=[solWaste[solWaste.length-1]];solDragSrc={zone:'waste'};solDragSrcIdx=solWaste.length-1;
            solDrag={x:e.clientX-solCW/2,y:e.clientY-solCH/2};solMouseOx=e.clientX;solMouseOy=e.clientY;return;
        }
        if(hit.zone==='tableau'){
            var col=solTableau[hit.idx];
            if(!col[hit.cardIdx].faceUp){
                if(hit.cardIdx===col.length-1)col[hit.cardIdx].faceUp=true;
                return;
            }
            solDragCards=col.slice(hit.cardIdx);solDragSrc={zone:'tableau',idx:hit.idx};solDragSrcIdx=hit.cardIdx;
            var ox=solOx(),ty=solOy()+solCH+20;
            solDrag={x:ox+hit.idx*(solCW+solGap),y:ty+hit.cardIdx*solFanY};
            solMouseOx=e.clientX;solMouseOy=e.clientY;return;
        }
        if(hit.zone==='foundation'){
            var f=solFoundation[hit.idx];if(!f.length)return;
            solDragCards=[f[f.length-1]];solDragSrc={zone:'foundation',idx:hit.idx};solDragSrcIdx=f.length-1;
            solDrag={x:e.clientX-solCW/2,y:e.clientY-solCH/2};solMouseOx=e.clientX;solMouseOy=e.clientY;
        }
    });
    addEventListener('mousemove',function(e){
        if(mode!=='solitaire'||!solDrag)return;
        solDrag.x+=e.clientX-solMouseOx;solDrag.y+=e.clientY-solMouseOy;
        solMouseOx=e.clientX;solMouseOy=e.clientY;
    });
    addEventListener('mouseup',function(e){
        if(mode!=='solitaire'||!solDrag||!solDragCards.length)return;
        var placed=false;
        var ox=solOx(),oy=solOy();
        // Try foundations (only single cards)
        if(solDragCards.length===1){
            for(var f=0;f<4;f++){
                var fx=ox+(f+3)*(solCW+solGap);
                if(Math.abs(solDrag.x-fx)<solCW&&Math.abs(solDrag.y-oy)<solCH&&solCanPlace(solDragCards[0],{zone:'foundation',idx:f})){
                    solFoundation[f].push(solDragCards[0]);placed=true;break;
                }
            }
        }
        // Try tableau columns
        if(!placed){
            var ty=oy+solCH+20;
            for(var t=0;t<7;t++){
                var tx=ox+t*(solCW+solGap);
                var colH=ty+(solTableau[t].length?solTableau[t].length*solFanY:0);
                if(Math.abs(solDrag.x-tx)<solCW&&solDrag.y>ty-solCH&&solDrag.y<colH+solCH&&solCanPlace(solDragCards[0],{zone:'tableau',idx:t})){
                    for(var dc=0;dc<solDragCards.length;dc++)solTableau[t].push(solDragCards[dc]);placed=true;break;
                }
            }
        }
        if(placed){
            // Remove from source
            if(solDragSrc.zone==='waste')solWaste.pop();
            else if(solDragSrc.zone==='tableau')solTableau[solDragSrc.idx].splice(solDragSrcIdx);
            else if(solDragSrc.zone==='foundation')solFoundation[solDragSrc.idx].pop();
            // Flip new top card if needed
            if(solDragSrc.zone==='tableau'){
                var srcCol=solTableau[solDragSrc.idx];
                if(srcCol.length&&!srcCol[srcCol.length-1].faceUp)srcCol[srcCol.length-1].faceUp=true;
            }
        }
        solDrag=null;solDragCards=[];solDragSrc=null;
    });

    /* ── Wire up buttons — click any game name to play ── */
    var gameNames=['draw','snake','tetris','pong','pacman','dots','mines','solitaire','invaders','sudoku','crossword'];
    gameNames.forEach(function(name,idx){
        document.getElementById('tool-'+name).addEventListener('click',function(){
            // Update carousel focus + start game
            if(window._carouselSetFocus) window._carouselSetFocus(idx);
            setMode(name);
        });
    });

}());
</script>
