<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <script>
        (function(){
            const s=localStorage.getItem('theme');
            if(s) document.documentElement.setAttribute('data-theme',s);
            else if(matchMedia('(prefers-color-scheme:dark)').matches)
                document.documentElement.setAttribute('data-theme','dark');
        }());
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emily Howkins Lange — Product Designer</title>
    <meta name="description" content="Portfolio of Emily Howkins Lange, product designer specialising in Design Systems.">
    <style>
        :root {
            --bg: #EDE8DF;
            --fg: #1C1409;
            --fg-dim: #9B8B7A;
            --border: rgba(0,0,0,0.10);
        }
        [data-theme="dark"] {
            --bg: #151008;
            --fg: #F2EDE3;
            --fg-dim: #555;
            --border: rgba(255,255,255,0.09);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11px;
            color: var(--fg);
            background: var(--bg);
        }

        /* ── WebGL canvas ── */
        #shader-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0;
        }

        /* ── Cursor light ── */
        #cursor-light {
            position: fixed; pointer-events: none;
            width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255,248,235,0.32) 0%,
                rgba(200,216,228,0.14) 30%,
                transparent 65%
            );
            z-index: 3;
            mix-blend-mode: lighten;
        }

        /* ── Grain ── */
        .grain {
            position: fixed; inset: -20%; width: 140%; height: 140%;
            pointer-events: none; z-index: 4; opacity: 0.042;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            animation: grain-move 0.18s steps(1) infinite;
        }
        @keyframes grain-move {
            0%  {background-position:0 0}      10% {background-position:-5% -10%}
            20% {background-position:-15% 5%}  30% {background-position:7% -25%}
            40% {background-position:-5% 25%}  50% {background-position:-15% 10%}
            60% {background-position:15% -25%} 70% {background-position:0 15%}
            80% {background-position:3% 35%}   90% {background-position:-18% 10%}
            100%{background-position:0 -20%}
        }

        /* ── Pixel trail canvas ── */
        #trail { position:fixed; inset:0; pointer-events:none; z-index:90; }

        /* ── Intro ── */
        #intro {
            position:fixed; inset:0; z-index:9000;
            background: var(--bg);
            display:flex; align-items:center; justify-content:center;
            transition: opacity 0.5s ease;
        }
        #intro.gone { opacity:0; pointer-events:none; }
        #intro-text { font-size:12px; letter-spacing:0.06em; color:var(--fg); }
        #intro-cursor {
            display:inline-block; width:1px; height:12px;
            background:var(--fg); margin-left:2px; vertical-align:middle;
            animation: blink 0.7s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        /* ── Page wrapper ── */
        #page {
            position:fixed; inset:0;
            display:flex; flex-direction:column;
            opacity:0; transition:opacity 0.45s;
            z-index:10;
        }
        #page.visible { opacity:1; }

        /* ── Topbar ── */
        .topbar {
            height:32px; flex-shrink:0;
            display:flex; align-items:center; justify-content:space-between;
            padding:0 20px;
            border-bottom:1px solid var(--border);
            font-size:11px;
            background: rgba(237,232,223,0.60);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        [data-theme="dark"] .topbar { background: rgba(17,12,5,0.72); }
        .topbar a { color:inherit; text-decoration:none; }
        .topbar a:hover { color:orangered; }
        .nav-sep { opacity:0.3; margin:0 6px; }
        .nav-current { font-weight:bold; }
        #theme-btn {
            background:none; border:none; cursor:pointer;
            font-size:13px; color:var(--fg); padding:0 4px;
            opacity:0.5; transition:opacity 0.2s;
        }
        #theme-btn:hover { opacity:1; }

        /* ── Center wrap ── */
        .center-wrap {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding:0 20px;
        }
        .content { width:100%; max-width:440px; }

        /* ── Identity ── */
        .identity { margin-bottom: 32px; }
        .identity-name {
            font-size: 18px; font-weight: 500; line-height: 1.3;
            display: block; margin-bottom: 5px;
            letter-spacing: -0.01em;
        }
        .identity-sub {
            font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase;
            color: var(--fg-dim); opacity: 0.45;
        }

        /* ── Identity ── */
        .identity-name { font-size: 22px; }
        .identity-sub {
            font-size: 10px; letter-spacing: 0.13em; text-transform: uppercase;
            color: var(--fg); opacity: 0.58;
        }

        /* ── Enter link ── */
        .enter-area { margin-top: 36px; }
        .enter-link {
            display: inline-flex; align-items: center; gap: 9px;
            font-size: 12px; letter-spacing: 0.1em;
            color: var(--fg); text-decoration: none;
            border-bottom: 1px solid var(--fg); padding-bottom: 4px;
            transition: color 0.22s ease, border-color 0.22s ease,
                        letter-spacing 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
        }
        .enter-link:hover {
            color: #8B2E3F; border-color: #8B2E3F;
            letter-spacing: 0.22em;
        }
        .enter-link .arrow {
            display: inline-block;
            transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
        }
        .enter-link:hover .arrow { transform: translateX(4px); }

        /* ── Play hint ── */
        .play-hint {
            font-size: 9px; letter-spacing: 0.08em;
            color: var(--fg); opacity: 0; margin-top: 32px;
            transition: opacity 1.2s ease;
        }
        .play-hint.visible { opacity: 0.32; }

        ::-webkit-scrollbar { display:none; }
    </style>
</head>
<body>

<!-- WebGL shader background -->
<canvas id="shader-canvas"></canvas>

<!-- Cursor light -->
<div id="cursor-light"></div>

<!-- Grain -->
<div class="grain"></div>

<!-- Pixel trail -->
<canvas id="trail"></canvas>

<!-- Intro -->
<div id="intro"><span id="intro-text"></span><span id="intro-cursor"></span></div>

<!-- Page -->
<div id="page">

    <div class="topbar">
        <div style="display:flex;align-items:center">
            <span class="nav-current">home</span>
            <span class="nav-sep">·</span>
            <a href="portfolio/">portfolio</a>
            <span class="nav-sep">·</span>
            <a href="playground/">playground</a>
        </div>
        <div style="display:flex;align-items:center">
            <button id="theme-btn">◐</button>
            <span class="nav-sep">·</span>
            <span>Emily Howkins Lange</span>
        </div>
    </div>

    <div class="center-wrap">
        <div class="content" id="content-parallax">

            <div class="identity">
                <span class="identity-name" id="hero-name">&nbsp;</span>
                <span class="identity-sub">product designer</span>
            </div>

            <div class="enter-area">
                <a class="enter-link" href="portfolio/">
                    enter <span class="arrow">→</span>
                </a>
            </div>

            <p class="play-hint" id="play-hint">Draw with your cursor — enter when ready</p>

        </div>
    </div>

</div>

<script>
'use strict';

// ── WebGL shader background (Richard Sancho-style organic gradient) ────────
(function () {
    const canvas = document.getElementById('shader-canvas');
    const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

    if (!gl) {
        // Graceful fallback to CSS gradient
        document.body.style.background =
            'radial-gradient(ellipse 65% 55% at 78% 8%, rgba(100,120,255,0.18) 0%, transparent 100%),' +
            'radial-gradient(ellipse 55% 45% at 12% 88%, rgba(255,140,70,0.13) 0%, transparent 100%),' +
            'var(--bg)';
        return;
    }

    const VS = `
        attribute vec2 aPos;
        void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
    `;

    /* Domain-warped fBm noise shader — inspired by Inigo Quilez */
    const FS = `
        precision mediump float;
        uniform float uTime;
        uniform vec2  uRes;
        uniform float uDark;

        vec2 hash2(vec2 p) {
            p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
            return -1.0 + 2.0 * fract(sin(p) * 43758.5453);
        }
        float noise(vec2 p) {
            vec2 i = floor(p), f = fract(p);
            vec2 u = f * f * (3.0 - 2.0 * f);
            return mix(
                mix(dot(hash2(i),            f          ),
                    dot(hash2(i+vec2(1,0)),  f-vec2(1,0)), u.x),
                mix(dot(hash2(i+vec2(0,1)),  f-vec2(0,1)),
                    dot(hash2(i+vec2(1,1)),  f-vec2(1,1)), u.x),
                u.y);
        }
        float fbm(vec2 p) {
            float v = 0.0, a = 0.5;
            for (int i = 0; i < 5; i++) {
                v += a * noise(p);
                p  = p * 2.02 + vec2(3.1, 1.7);
                a *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / uRes;
            float t  = uTime * 0.11;

            /* Aspect-corrected, centred coord */
            vec2 p = (uv - 0.5) * vec2(uRes.x / uRes.y, 1.0) * 2.6;

            /* Two levels of domain warping for organic look */
            vec2 q = vec2(fbm(p            + vec2(0.0, 0.0) + t * 0.7),
                          fbm(p            + vec2(5.2, 1.3) + t * 0.6));
            vec2 r = vec2(fbm(p + 2.1 * q + vec2(1.7, 9.2) + t * 0.5),
                          fbm(p + 2.1 * q + vec2(8.3, 2.8) + t * 0.4));
            float f = (fbm(p + 3.0 * r) + 1.0) * 0.5;

            /* Light palette — linen, dusty blue, sage, terracotta */
            vec3 bgL    = vec3(0.929, 0.910, 0.875);
            vec3 dustL  = vec3(0.420, 0.600, 0.675);
            vec3 sageL  = vec3(0.545, 0.678, 0.498);
            vec3 warmL  = vec3(0.800, 0.510, 0.380);
            /* Dark palette */
            vec3 bgD    = vec3(0.082, 0.063, 0.031);
            vec3 dustD  = vec3(0.208, 0.329, 0.408);
            vec3 sageD  = vec3(0.247, 0.361, 0.239);
            vec3 warmD  = vec3(0.471, 0.220, 0.157);

            vec3 bg   = mix(bgL,   bgD,   uDark);
            vec3 dust = mix(dustL, dustD, uDark);
            vec3 sage = mix(sageL, sageD, uDark);
            vec3 warm = mix(warmL, warmD, uDark);

            vec3 col = bg;
            col = mix(col, dust, smoothstep(0.30, 0.72, f)            * 0.44);
            col = mix(col, warm, smoothstep(0.42, 0.82, length(q))    * 0.36);
            col = mix(col, sage, smoothstep(0.38, 0.76, r.x + 0.5)   * 0.30);
            col = mix(col, warm, smoothstep(0.55, 0.90, r.y + 0.5)   * 0.22);

            gl_FragColor = vec4(col, 1.0);
        }
    `;

    function compileShader(type, src) {
        const sh = gl.createShader(type);
        gl.shaderSource(sh, src);
        gl.compileShader(sh);
        if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
            console.warn('Shader compile error:', gl.getShaderInfoLog(sh));
            return null;
        }
        return sh;
    }

    const vs = compileShader(gl.VERTEX_SHADER,   VS);
    const fs = compileShader(gl.FRAGMENT_SHADER, FS);
    if (!vs || !fs) return;

    const prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
        console.warn('Shader link error:', gl.getProgramInfoLog(prog));
        return;
    }

    /* Fullscreen quad */
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    const posLoc = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);
    gl.useProgram(prog);

    const uTimeLoc = gl.getUniformLocation(prog, 'uTime');
    const uResLoc  = gl.getUniformLocation(prog, 'uRes');
    const uDarkLoc = gl.getUniformLocation(prog, 'uDark');

    const isDark = () => document.documentElement.getAttribute('data-theme') === 'dark';
    let curDark    = isDark() ? 1.0 : 0.0;
    let targetDark = curDark;

    new MutationObserver(() => { targetDark = isDark() ? 1.0 : 0.0; })
        .observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
    }
    resize();
    window.addEventListener('resize', resize);

    let t0 = null;
    function render(ts) {
        if (!t0) t0 = ts;
        curDark += (targetDark - curDark) * 0.035;
        gl.uniform1f(uTimeLoc, (ts - t0) * 0.001);
        gl.uniform2f(uResLoc,  canvas.width, canvas.height);
        gl.uniform1f(uDarkLoc, curDark);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
}());

// ── Cursor light ──────────────────────────────────────────────────────────
const light = document.getElementById('cursor-light');
document.addEventListener('mousemove', e => {
    light.style.left = (e.clientX - 300) + 'px';
    light.style.top  = (e.clientY - 300) + 'px';
});

// ── Name scramble ─────────────────────────────────────────────────────────
const CHARS = 'abcdefghijklmnopqrstuvwxyz·—/';
function scrambleTo(el, target, ms) {
    const t0 = performance.now();
    (function f(now) {
        const p = Math.min((now - t0) / ms, 1);
        const settled = Math.floor(p * target.length);
        el.textContent = target.split('').map((c, i) => {
            if (c === ' ') return ' ';
            if (i < settled) return c;
            return CHARS[Math.floor(Math.random() * CHARS.length)];
        }).join('');
        if (p < 1) requestAnimationFrame(f);
        else el.textContent = target;
    })(t0);
}

// ── Intro sequence ────────────────────────────────────────────────────────
const introEl = document.getElementById('intro');
const introTx = document.getElementById('intro-text');
const pageEl  = document.getElementById('page');
const heroEl  = document.getElementById('hero-name');

function reveal() {
    pageEl.classList.add('visible');
    setTimeout(() => scrambleTo(heroEl, 'Emily Howkins Lange', 650), 80);
    setTimeout(() => {
        const hint = document.getElementById('play-hint');
        if (hint) hint.classList.add('visible');
    }, 2800);
}

if (sessionStorage.getItem('intro-seen')) {
    introEl.style.display = 'none';
    reveal();
} else {
    const name = 'emily howkins lange';
    let i = 0;
    (function tick() {
        introTx.textContent = name.slice(0, i++);
        if (i <= name.length) setTimeout(tick, 55 + Math.random() * 60);
        else setTimeout(() => {
            introEl.classList.add('gone');
            sessionStorage.setItem('intro-seen', '1');
            setTimeout(() => { introEl.style.display = 'none'; reveal(); }, 520);
        }, 420);
    }());
}

// ── Mouse parallax on content ─────────────────────────────────────────────
(function () {
    const el = document.getElementById('content-parallax');
    let tx = 0, ty = 0, cx = 0, cy = 0;
    document.addEventListener('mousemove', e => {
        tx = (e.clientX / window.innerWidth  - 0.5) * 18;
        ty = (e.clientY / window.innerHeight - 0.5) * 12;
    });
    (function loop() {
        cx += (tx - cx) * 0.06;
        cy += (ty - cy) * 0.06;
        el.style.transform = `translate(${cx.toFixed(2)}px, ${cy.toFixed(2)}px)`;
        requestAnimationFrame(loop);
    }());
}());

// ── Pixel trail ───────────────────────────────────────────────────────────
(function () {
    const c = document.getElementById('trail');
    const ctx = c.getContext('2d');
    let W, H;
    const rsz = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
    rsz(); addEventListener('resize', rsz);
    const dark = () => document.documentElement.getAttribute('data-theme') === 'dark';
    const PL = ['#1C1409','#1C1409','#1C1409','#6B92A8','#6B92A8','#8B2E3F','#8B2E3F'];
    const PD = ['#F2EDE3','#F2EDE3','#C8D8E4','#6B92A8','#6B92A8','#8B2E3F','#8B2E3F'];
    let px = [], lx = null, ly = null;
    addEventListener('mousemove', e => {
        const spd = lx != null ? Math.hypot(e.clientX - lx, e.clientY - ly) : 0;
        const n = Math.min(5, Math.ceil(spd / 5));
        const pal = dark() ? PD : PL;
        for (let i = 0; i < n; i++) {
            const big = spd > 18 && Math.random() < 0.22;
            px.push({
                x: e.clientX + (Math.random() - 0.5) * (big ? 14 : 7),
                y: e.clientY + (Math.random() - 0.5) * (big ? 14 : 7),
                s: big ? 6 : 4, a: 0.85,
                c: pal[Math.floor(Math.random() * pal.length)]
            });
        }
        lx = e.clientX; ly = e.clientY;
    });
    // Click burst
    addEventListener('click', function(e) {
        if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON') return;
        const pal = dark() ? PD : PL;
        for (let i = 0; i < 36; i++) {
            const angle = (i / 36) * Math.PI * 2;
            const r = 4 + Math.random() * 28;
            px.push({
                x: e.clientX + Math.cos(angle) * r * 0.4 + (Math.random()-0.5)*6,
                y: e.clientY + Math.sin(angle) * r * 0.4 + (Math.random()-0.5)*6,
                s: 3 + Math.floor(Math.random() * 5), a: 0.9,
                c: pal[Math.floor(Math.random() * pal.length)]
            });
        }
    });
    (function draw() {
        ctx.clearRect(0, 0, W, H);
        for (let i = px.length - 1; i >= 0; i--) {
            const p = px[i]; p.a -= 0.042;
            if (p.a <= 0) { px.splice(i, 1); continue; }
            ctx.globalAlpha = p.a; ctx.fillStyle = p.c;
            ctx.fillRect(Math.round(p.x), Math.round(p.y), p.s, p.s);
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
    }());
}());

// ── Dark mode toggle ──────────────────────────────────────────────────────
(function () {
    const btn  = document.getElementById('theme-btn');
    const html = document.documentElement;
    const get  = () => html.getAttribute('data-theme') ||
                       (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    const set  = t  => { html.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
    btn.addEventListener('click', () => set(get() === 'dark' ? 'light' : 'dark'));
}());
</script>
</body>
</html>
